<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="style.css"/>
<title>Micro Facts · Step 1 Hub</title>
<style>
/* ── Micro-specific accent (sage green) ──────────────────── */
:root {
  --accent:       var(--sage);
  --accent-light: var(--sage-light);
  --accent-glow:  rgba(94,154,112,.12);
}
</style>
</head>
<body>

<script src="nav.js"></script>

<div class="wrap">

  <!-- ── Header ──────────────────────────────────────────── -->
  <div class="ref-page-header">
    <div class="ref-page-left">
      <div class="ref-page-eyebrow">Microbiology Reference</div>
      <h1 class="ref-page-title">Micro <em>Facts</em></h1>
    </div>
    <div class="ref-count" id="results-meta"></div>
  </div>

  <!-- ── Search ──────────────────────────────────────────── -->
  <div class="ref-search-row">
    <div class="ref-search-wrap">
      <span class="ref-search-icon">
        <svg class="ref-search-svg" viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="22" y2="22"/>
        </svg>
      </span>
      <input class="ref-search-input" type="text" id="micro-search"
             placeholder="Organism, disease, treatment, pearl…"
             oninput="onSearch()" autocomplete="off"/>
    </div>
  </div>

  <!-- ── Category tabs ───────────────────────────────────── -->
  <div class="cat-tab-bar" id="cat-tabs" role="tablist"></div>

  <!-- ── Panels ──────────────────────────────────────────── -->
  <div id="panels-container"></div>

</div>

<!-- ── Detail Modal ──────────────────────────────────────── -->
<div class="drug-modal-overlay" id="micro-detail-modal" role="dialog" aria-modal="true" aria-labelledby="mdm-name" onclick="handleMicroOverlayClick(event)">
  <div class="drug-modal" id="micro-modal">

    <!-- Top bar: breadcrumb + close -->
    <div class="drug-modal-topbar" id="mdm-topbar">
      <div class="drug-modal-breadcrumb" id="mdm-cat"></div>
      <div class="drug-modal-topbar-right">
        <button class="drug-modal-close" onclick="document.getElementById('micro-detail-modal').classList.remove('open');document.body.style.overflow=''" title="Close (Esc)">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M2 2l10 10M12 2L2 12"/></svg>
        </button>
      </div>
    </div>

    <!-- Identity -->
    <div class="drug-modal-header">
      <div class="drug-modal-title" id="mdm-name"></div>
      <div class="drug-modal-aka" id="mdm-gram"></div>
    </div>

    <!-- Scrollable body -->
    <div class="drug-modal-body" id="mdm-content"></div>

  </div>
</div>

<script src="micro_data.js"></script>
<script src="app.js"></script>
<script>
/* ── Config ─────────────────────────────────────────────── */
const CAT_META = {
  bacteria:  {
    label: 'Bacteria',
    color: '#3a7a5a',
    desc: 'Organized by Gram stain and morphology — the same way boards will test you. Master the GP/GN divide first, then nail the atypicals. Virulence factors and toxin mechanisms are the highest-yield details; memorize one unique fact per organism.'
  },
  viruses:   {
    label: 'Viruses',
    color: '#5a4490',
    desc: 'DNA viruses are mostly double-stranded and replicate in the nucleus. RNA viruses are mostly single-stranded. Know your herpesvirus reactivation patterns cold — they are perennial vignettes. HIV lifecycle and antiretroviral mechanisms are guaranteed questions.'
  },
  fungi:     {
    label: 'Fungi',
    color: '#9e6a3d',
    desc: 'Systemic mycoses are tested by geography and exposure history. Opportunistic fungi appear almost exclusively in immunocompromised (HIV, transplant) vignettes. Know the dimorphic rule: mold in the cold, yeast in the heat.'
  },
  parasites: {
    label: 'Parasites',
    color: '#3d6e8a',
    desc: 'Transmission route is the single highest-yield fact for every parasite. Plasmodium (malaria) is the most tested parasite on Step 1 — know all four species. Toxoplasma and Cryptosporidium are classic HIV vignettes.'
  },
};

let allOrgs = [], activeTab = 'bacteria', searchQ = '';

/* ── Build flat list ─────────────────────────────────────── */
function buildOrgList() {
  const list = [];
  Object.entries(MICRO).forEach(([cat, groups]) =>
    groups.forEach(grp =>
      (grp.organisms || []).forEach(o => list.push({ ...o, category: cat, groupName: grp.group }))
    )
  );
  return list;
}

/* ── Filtering ───────────────────────────────────────────── */
function getFiltered() {
  if (searchQ) {
    return allOrgs.filter(o => {
      const blob = [o.name, o.gram, o.summary, o.disease, o.tx,
                    o.pearl, o.virulence].join(' ').toLowerCase();
      return blob.includes(searchQ);
    });
  }
  return allOrgs.filter(o => o.category === activeTab);
}

/* ── Render ──────────────────────────────────────────────── */
function render() {
  const filtered = getFiltered();
  const isSearch = searchQ.length > 0;

  document.getElementById('results-meta').innerHTML = isSearch
    ? `<strong>${filtered.length}</strong> of ${allOrgs.length} organisms`
    : `<strong>${allOrgs.length}</strong> organisms`;

  renderTabs();
  renderPanels(filtered, isSearch);
}

function renderTabs() {
  let html = '';
  Object.entries(CAT_META).forEach(([cat, meta]) => {
    const isActive = activeTab === cat && !searchQ;
    html += `<button class="cat-tab${isActive ? ' active' : ''}"
      onclick="switchTab('${cat}')" role="tab">
      <span class="tab-dot" style="background:${meta.color}"></span>${meta.label}
    </button>`;
  });
  document.getElementById('cat-tabs').innerHTML = html;
}

function renderPanels(filtered, isSearch) {
  const container = document.getElementById('panels-container');

  if (!filtered.length) {
    container.innerHTML = `<div class="cards-grid" style="margin-top:16px;">
      <div class="ref-empty">
        <div class="ref-empty-title">No results</div>
        <div class="ref-empty-sub">Try a different search term.</div>
      </div></div>`;
    return;
  }

  if (isSearch) {
    const cats = Object.keys(CAT_META).filter(c => filtered.some(o => o.category === c));
    container.innerHTML = cats.map(cat => {
      const catOrgs = filtered.filter(o => o.category === cat);
      if (!catOrgs.length) return '';
      const meta = CAT_META[cat];
      return `<div class="ref-panel" id="panel-${cat}">
        <div class="search-cat-label" style="color:${meta.color}">${meta.label}</div>
        <div class="cards-grid">${catOrgs.map(o => renderCard(o, meta.color)).join('')}</div>
      </div>`;
    }).join('');
    return;
  }

  const cat = activeTab;
  const meta = CAT_META[cat];
  const groups = [...new Set(filtered.map(o => o.groupName))];

  const introHtml = `
    <div class="cat-intro" style="--cat-color:${meta.color}">
      <div class="cat-intro-title" style="color:${meta.color}">${meta.label}</div>
      <div class="cat-intro-desc">${meta.desc}</div>
    </div>`;

  const groupsHtml = groups.map((grp, gi) => {
    const grpOrgs = filtered.filter(o => o.groupName === grp);
    const gid = `grp-${cat}-${gi}`;
    return `<div class="group-section">
      <div class="class-group-header">
        <span class="class-label" style="color:${meta.color};border-color:${meta.color}40;background:${meta.color}12;">
          <span style="font-size:7px;">◆</span> ${grp}
        </span>
        <button class="group-expand-btn" style="--cat-color:${meta.color}" onclick="toggleGroup('${gid}',this)">▼ Expand</button>
      </div>
      <div class="cards-grid" id="${gid}">
        ${grpOrgs.map(o => renderCard(o, meta.color)).join('')}
      </div>
    </div>`;
  }).join('');

  container.innerHTML = `<div class="ref-panel" id="panel-${cat}">${introHtml}${groupsHtml}</div>`;
}

function renderCard(o, catColor) {
  const color = catColor || CAT_META[o.category]?.color || 'var(--accent)';
  return `<div class="rcard" data-cat="${o.category}" style="--cat-color:${color};border-left-color:${color}"
    tabindex="0" role="button" aria-label="${o.name}"
    onclick='openMicroDetail(${JSON.stringify(o).replace(/'/g,"&#39;")})'>
    <div class="rcard-header">
      <div class="rcard-header-left">
        <div class="rcard-name">${o.name}</div>
        ${o.gram ? `<div class="rcard-aka">${o.gram}</div>` : ''}
      </div>
    </div>
    <div class="rcard-summary">${o.summary || ''}</div>
  </div>`;
}

function toggleGroup(gid, btn) {
  const grid = document.getElementById(gid);
  const hidden = grid.style.display === 'none';
  grid.style.display = hidden ? '' : 'none';
  btn.textContent = hidden ? '▲ Collapse' : '▼ Expand';
}

function switchTab(cat) {
  activeTab = cat;
  searchQ = '';
  document.getElementById('micro-search').value = '';
  render();
}

function onSearch() {
  searchQ = document.getElementById('micro-search').value.toLowerCase().trim();
  render();
}

/* ── Detail modal ────────────────────────────────────────── */
function openMicroDetail(o) {
  const fmt = t => t ? t.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>') : '';
  const color = CAT_META[o.category]?.color || 'var(--sage)';
  const catLabel = CAT_META[o.category]?.label || o.category;

  document.getElementById('micro-modal').style.setProperty('--cat-color', color);

  document.getElementById('mdm-cat').innerHTML = `
    <span class="drug-modal-banner-cat" style="color:${color};border-color:${color}50;background:${color}12;">${catLabel.toUpperCase()}</span>
    ${o.groupName ? `<span class="drug-modal-banner-sep">›</span><span class="drug-modal-banner-grp">${o.groupName}</span>` : ''}
  `;
  const topbar = document.getElementById('mdm-topbar');
  topbar.style.borderTop = `3px solid ${color}`;
  topbar.style.borderBottom = `1px solid ${color}20`;

  document.getElementById('mdm-name').textContent = o.name;
  const gramEl = document.getElementById('mdm-gram');
  gramEl.textContent = o.gram || '';
  gramEl.style.display = o.gram ? '' : 'none';

  const rows = [
    { label: 'Virulence Factors', cls: 'lbl-moa', val: o.virulence },
    { label: 'Diseases',          cls: 'lbl-use', val: o.disease   },
    { label: 'Treatment',         cls: 'lbl-se',  val: o.tx        },
  ].filter(r => r.val);

  document.getElementById('mdm-content').innerHTML =
    rows.map(r => `
      <div class="rcard-field">
        <span class="rcard-field-label ${r.cls}">${r.label}</span>
        <div class="rcard-field-text">${fmt(r.val)}</div>
      </div>`
    ).join('') +
    (o.pearl ? `
      <div class="rcard-pearl">
        <span class="pearl-diamond" style="color:${color}">◆</span>
        <div class="pearl-body">
          <span class="pearl-label" style="color:${color}">Step 1 Pearl</span>
          <span class="pearl-text">${fmt(o.pearl)}</span>
        </div>
      </div>` : '');

  document.getElementById('mdm-content').scrollTop = 0;
  document.getElementById('micro-detail-modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function handleMicroOverlayClick(e) {
  if (e.target === document.getElementById('micro-detail-modal')) {
    document.getElementById('micro-detail-modal').classList.remove('open');
    document.body.style.overflow = '';
  }
}

/* ── Keyboard ────────────────────────────────────────────── */
document.addEventListener('keydown', e => {
  if ((e.key === 'Enter' || e.key === ' ') && e.target.classList.contains('rcard')) {
    e.preventDefault(); e.target.click();
  }
  if (e.key === 'Escape') {
    document.getElementById('micro-detail-modal').classList.remove('open');
    document.body.style.overflow = '';
  }
  if (e.key === '/' && document.activeElement !== document.getElementById('micro-search')) {
    e.preventDefault();
    document.getElementById('micro-search').focus();
  }
});

/* ── Init ────────────────────────────────────────────────── */
document.addEventListener('DOMContentLoaded', () => {
  allOrgs = buildOrgList();
  activeTab = 'bacteria';
  render();
});
</script>
</body>
</html>
