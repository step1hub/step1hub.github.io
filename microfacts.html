<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="style.css"/>
<title>Micro Facts · Step 1 Hub</title>
<style>
:root {
  --accent:       var(--sage);
  --accent-light: var(--sage-light);
  --accent-glow:  rgba(94,154,112,.12);
}

/* ── Page header ─────────────────────────────────────────── */
.ref-page-header {
  padding: 36px 0 20px;
  display: flex; align-items: flex-end; justify-content: space-between;
  gap: 20px; flex-wrap: wrap;
}
.ref-page-eyebrow {
  font-family: 'DM Sans', sans-serif;
  font-size: 10px; font-weight: 700; letter-spacing: 3px;
  text-transform: uppercase; color: var(--accent);
  opacity: .85; margin-bottom: 10px;
}
.ref-page-title {
  font-family: 'Playfair Display', serif;
  font-size: clamp(30px, 4vw, 46px); font-weight: 700;
  line-height: 1.1; letter-spacing: -0.5px; color: var(--ink); margin-bottom: 0;
}
.ref-page-title em { font-style: italic; color: var(--accent); }
.ref-count { font-size: 12px; color: var(--muted); align-self: flex-end; padding-bottom: 4px; white-space: nowrap; }
.ref-count strong { color: var(--ink2); font-weight: 600; }

/* ── Search ──────────────────────────────────────────────── */
.ref-search-row { padding: 18px 0 0; }
.ref-search-wrap { position: relative; max-width: 480px; }
.ref-search-icon {
  position: absolute; left: 13px; top: 50%; transform: translateY(-50%);
  pointer-events: none; display: flex; align-items: center;
}
.ref-search-svg { width: 13px; height: 13px; stroke: var(--dim); fill: none; stroke-width: 2; stroke-linecap: round; }
.ref-search-input {
  width: 100%; padding: 9px 14px 9px 36px;
  border: 1.5px solid var(--border); border-radius: 99px;
  background: var(--surface); font-size: 13px; color: var(--ink);
  font-family: 'DM Sans', sans-serif;
  outline: none; transition: border-color .15s, box-shadow .15s;
}
.ref-search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
.ref-search-input::placeholder { color: var(--dim); }

/* ── Category tabs ───────────────────────────────────────── */
.cat-tab-bar {
  display: flex; flex-wrap: nowrap; overflow-x: auto;
  scrollbar-width: none; gap: 0; margin-top: 18px;
  border-bottom: 1px solid var(--border2);
}
.cat-tab-bar::-webkit-scrollbar { display: none; }
.cat-tab {
  padding: 9px 10px;
  font-family: 'DM Sans', sans-serif; font-size: 11px;
  letter-spacing: 0.2px; text-transform: uppercase; font-weight: 600;
  color: var(--muted); border: none; border-bottom: 2px solid transparent;
  cursor: pointer; white-space: nowrap; background: transparent;
  transition: color .15s, border-color .15s;
  display: flex; align-items: center; gap: 4px; flex-shrink: 0;
}
.cat-tab:hover { color: var(--ink2); }
.cat-tab.active { color: var(--ink); border-bottom-color: var(--accent); }
.tab-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }

/* ── Category intro ──────────────────────────────────────── */
.cat-intro {
  border-radius: 12px; padding: 16px 20px; margin: 18px 0 22px;
  background: var(--surface); border: 1px solid var(--border);
  border-left: 4px solid var(--cat-color, var(--accent));
}
.cat-intro-title {
  font-family: 'Playfair Display', serif;
  font-size: 22px; font-weight: 700; margin-bottom: 5px; letter-spacing: -0.4px;
}
.cat-intro-desc { font-size: 12.5px; color: var(--muted); line-height: 1.6; }

/* ── Group row ───────────────────────────────────────────── */
.group-section { margin-bottom: 28px; }
.class-group-header {
  display: flex; align-items: center; justify-content: space-between; margin-bottom: 11px;
}
.class-label {
  font-family: 'DM Sans', sans-serif; font-size: 10px; font-weight: 700;
  letter-spacing: 0.3px; text-transform: uppercase; padding: 5px 14px;
  display: inline-flex; align-items: center; gap: 6px;
  border-radius: 99px; border: 1.5px solid currentColor; opacity: 0.9;
}
.group-expand-btn {
  font-family: 'DM Mono', monospace; font-size: 8px; letter-spacing: 1px;
  text-transform: uppercase; padding: 5px 12px; border-radius: 99px;
  border: 1.5px solid var(--border); background: transparent;
  color: var(--muted); cursor: pointer; white-space: nowrap; flex-shrink: 0;
  transition: background .15s, color .15s, border-color .15s;
}
.group-expand-btn:hover { background: var(--sage-light); color: var(--sage); border-color: var(--sage); }

/* ── Card grid ───────────────────────────────────────────── */
.cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 10px; align-items: stretch;
}

/* ── Organism card ───────────────────────────────────────── */
.rcard {
  background: var(--surface);
  border: 1px solid var(--border);
  border-left: 3px solid var(--accent);
  border-radius: 12px; overflow: hidden; cursor: pointer;
  transition: box-shadow .18s ease, transform .12s ease;
  box-shadow: 0 1px 3px rgba(42,31,26,.04);
}
.rcard:hover { box-shadow: 0 4px 18px rgba(42,31,26,.10); transform: translateY(-1px); }
.rcard:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

.rcard-header {
  padding: 13px 14px 0;
  display: flex; justify-content: space-between; align-items: flex-start; gap: 8px;
}
.rcard-header-left { flex: 1; min-width: 0; }
.rcard-name {
  font-family: 'Playfair Display', serif;
  font-size: 16px; font-weight: 700; line-height: 1.2; color: var(--ink); letter-spacing: -0.3px;
}
.rcard-aka {
  font-family: 'DM Mono', monospace;
  font-size: 9px; font-style: normal; line-height: 1.7; margin-top: 5px;
  word-break: break-word; font-weight: 400; opacity: 0.85;
}
.rcard-toggle {
  flex-shrink: 0; background: none; border: none; cursor: pointer;
  font-size: 11px; line-height: 1; padding: 3px 0 0 4px; align-self: flex-start;
  font-family: 'DM Mono', monospace; transition: color .14s;
}
.rcard-summary {
  padding: 8px 14px 14px; font-size: 12px; color: var(--ink2); line-height: 1.62;
  border-top: 1px solid var(--border2); margin-top: 8px;
}

/* ── Field pill labels ───────────────────────────────────── */
.rcard-field {
  padding: 10px 14px; border-bottom: 1px solid var(--border2);
}
.rcard-field:last-of-type { border-bottom: none; }
.rcard-field-label {
  font-family: 'DM Mono', monospace;
  font-size: 8px; letter-spacing: 0.8px; text-transform: uppercase;
  padding: 3px 9px; border-radius: 99px;
  display: inline-block; margin-bottom: 7px; border: 1px solid; font-weight: 500;
}
.lbl-vir { background: #2e684514; color: #2e6845; border-color: #2e684545; }
.lbl-dis { background: #8a284414; color: #8a2844; border-color: #8a284445; }
.lbl-dx  { background: #7a3e1814; color: #7a3e18; border-color: #7a3e1845; }
.lbl-tx  { background: #3a508014; color: #3a5080; border-color: #3a508045; }
.rcard-field-text { font-size: 12px; color: var(--ink2); line-height: 1.65; }
.rcard-field-text strong { color: var(--ink); font-weight: 600; }
.info-line { line-height: 1.65; font-size: 12px; color: var(--ink2); }
.info-line + .info-line { margin-top: 4px; }
.info-line strong { color: var(--ink); font-weight: 600; }

/* ── Pearl ───────────────────────────────────────────────── */
.rcard-pearl {
  display: flex; gap: 10px; align-items: flex-start;
  background: var(--sage-light);
  border-top: 1px solid rgba(94,154,112,.20);
  padding: 14px 16px; margin: 0;
}
.pearl-diamond { flex-shrink: 0; margin-top: 2px; line-height: 1; font-size: 12px; }
.pearl-body { flex: 1; min-width: 0; }
.pearl-label {
  font-family: 'DM Sans', sans-serif; font-size: 10px; letter-spacing: 0.2px;
  text-transform: uppercase; display: inline; font-weight: 700; margin-right: 5px;
}
.pearl-text { font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--ink2); line-height: 1.65; display: inline; }
.pearl-text strong { font-weight: 700; }

/* ── Modal ───────────────────────────────────────────────── */
.drug-modal-overlay {
  display: none; position: fixed; inset: 0; z-index: 1000;
  background: rgba(42,31,26,.45); backdrop-filter: blur(3px);
  align-items: center; justify-content: center; padding: 24px;
}
.drug-modal-overlay.open { display: flex; }
.drug-modal {
  background: var(--surface); border-radius: 18px;
  width: 100%; max-width: 760px; max-height: 88vh;
  display: flex; flex-direction: column;
  box-shadow: 0 24px 80px rgba(42,31,26,.22); overflow: hidden;
  animation: modalIn .2s ease;
}
@keyframes modalIn {
  from { opacity: 0; transform: translateY(12px) scale(.98); }
  to   { opacity: 1; transform: none; }
}
/* ── Topbar: breadcrumb left, nav+close right — never reflows ── */
.drug-modal-topbar {
  display: flex; align-items: center; justify-content: space-between;
  gap: 12px; padding: 10px 16px 10px 20px;
  border-bottom: 3px solid var(--modal-accent, var(--accent));
  flex-shrink: 0; min-height: 44px;
}
.drug-modal-breadcrumb {
  display: flex; align-items: center; gap: 6px;
  font-family: 'DM Sans', sans-serif; font-size: 10px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.3px; flex: 1; min-width: 0;
  overflow: hidden;
}
.drug-modal-banner-cat {
  padding: 3px 10px; border-radius: 99px; border: 1.5px solid currentColor;
  opacity: 0.9; white-space: nowrap; flex-shrink: 0;
}
.drug-modal-banner-sep { opacity: 0.4; font-size: 9px; flex-shrink: 0; }
.drug-modal-banner-grp { opacity: 0.7; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.drug-modal-topbar-right {
  display: flex; align-items: center; gap: 6px; flex-shrink: 0;
}
.drug-modal-nav-btn {
  background: none; border: 1.5px solid var(--border); border-radius: 99px; padding: 5px 12px;
  font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 0.5px;
  color: var(--muted); cursor: pointer; transition: border-color .14s, color .14s;
  white-space: nowrap;
}
.drug-modal-nav-btn:hover { color: var(--ink); border-color: var(--ink2); }
.drug-modal-nav-btn:disabled { opacity: 0.3; cursor: default; }
.drug-modal-counter {
  font-family: 'DM Mono', monospace; font-size: 9px; color: var(--dim);
  letter-spacing: 0.5px; padding: 0 4px; white-space: nowrap;
}
.drug-modal-close {
  background: none; border: none; cursor: pointer; color: var(--dim);
  font-size: 16px; line-height: 1; padding: 4px 6px; border-radius: 8px;
  transition: color .14s, background .14s; flex-shrink: 0;
}
.drug-modal-close:hover { color: var(--ink); background: var(--surface2); }

/* ── Title block — fixed padding, never shifts ── */
.drug-modal-header {
  padding: 14px 24px 0; flex-shrink: 0;
}
.drug-modal-title {
  font-family: 'Playfair Display', serif;
  font-size: 24px; font-weight: 700; color: var(--ink); letter-spacing: -0.4px; line-height: 1.2;
}
.drug-modal-aka {
  font-family: 'DM Mono', monospace; font-size: 9.5px; margin-top: 5px;
  line-height: 1.6; opacity: 0.85;
}

/* ── Summary strip ── */
.drug-modal-summary {
  font-size: 13px; color: var(--ink2); line-height: 1.65;
  padding: 12px 24px; border-top: 1px solid var(--border2); margin-top: 14px; flex-shrink: 0;
}
.drug-modal-body { overflow-y: auto; padding: 0 24px 24px; flex: 1; }
.drug-modal-body .rcard-field { padding: 12px 0; border-bottom: 1px solid var(--border2); }
.drug-modal-body .rcard-field:last-of-type { border-bottom: none; }
.drug-modal-body .rcard-pearl { margin-top: 8px; border-radius: 12px; border: 1px solid rgba(94,154,112,.20); }

/* ── Search results ──────────────────────────────────────── */
.search-cat-label {
  font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 2px;
  text-transform: uppercase; margin: 20px 0 10px;
  display: flex; align-items: center; gap: 8px;
}
.search-cat-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }
mark.search-hl { background: rgba(94,154,112,.18); color: var(--ink); border-radius: 2px; padding: 0 2px; }

/* ── Empty state ─────────────────────────────────────────── */
.ref-empty { grid-column: 1/-1; padding: 52px 24px; text-align: center; }
.ref-empty-title { font-family: 'Playfair Display', serif; font-size: 17px; font-weight: 600; color: var(--ink2); margin-bottom: 5px; }
.ref-empty-sub { font-size: 13px; color: var(--muted); }

/* ── Mobile ──────────────────────────────────────────────── */
@media (max-width: 600px) {
  .cards-grid { grid-template-columns: 1fr; }
  .ref-page-header { padding-top: 20px; }
  .cat-tab { padding: 8px 8px; font-size: 9px; }
  .drug-modal { border-radius: 12px; }
}
</style>
</head>

<div class="petals" aria-hidden="true">
  <div class="petal"></div><div class="petal"></div><div class="petal"></div>
  <div class="petal"></div><div class="petal"></div><div class="petal"></div>

<script src="nav.js"></script>

<div class="wrap">

  <div class="ref-page-header">
    <div>
      <div class="ref-page-eyebrow">Microbiology Reference</div>
      <h1 class="ref-page-title">Micro <em>Facts</em></h1>

    <div class="ref-count" id="results-meta"></div>
  </div>

  <div class="ref-search-row">
    <div class="ref-search-wrap">
      <span class="ref-search-icon">
        <svg class="ref-search-svg" viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="22" y2="22"/>
        </svg>
      </span>
      <input class="ref-search-input" type="text" id="micro-search"
             placeholder="Organism, disease, treatment, pearl…"
             oninput="onSearch()" autocomplete="off"/>
    </div>

  <div class="cat-tab-bar" id="cat-tabs" role="tablist"></div>

</div>

<!-- Organism detail modal -->
<div class="drug-modal-overlay" id="micro-modal-overlay" onclick="handleModalOverlayClick(event)">

    <!-- Single fixed topbar: breadcrumb left · nav + close right -->
    <div class="drug-modal-topbar" id="modal-topbar">

    <div class="drug-modal-summary" id="modal-summary"></div>

<script src="micro_data.js"></script>
<script src="app.js"></script>
<script>
const CAT_META = {
  bacteria:  { label: 'Bacteria',   color: '#3a7a5a', desc: 'Organized by Gram stain and morphology — the same way boards will test you. Master the GP/GN divide first, then nail the atypicals. Virulence factors and toxin mechanisms are highest-yield; memorize one unique fact per organism.' },
  viruses:   { label: 'Viruses',    color: '#5a4490', desc: 'DNA viruses are mostly double-stranded and replicate in the nucleus. RNA viruses are mostly single-stranded and cytoplasmic. Know herpesvirus reactivation patterns cold — perennial vignettes. HIV lifecycle and antiretroviral mechanisms are guaranteed questions.' },
  fungi:     { label: 'Fungi',      color: '#9e6a3d', desc: 'Systemic mycoses are tested by geography and exposure history. Opportunistic fungi appear almost exclusively in immunocompromised vignettes (HIV, transplant). The dimorphic rule: mold in the cold, yeast in the heat.' },
  parasites: { label: 'Parasites',  color: '#3d6e8a', desc: 'Transmission route is the single highest-yield fact for every parasite. Plasmodium (malaria) is the most tested parasite — know all four species. Toxoplasma and Cryptosporidium are classic HIV vignettes.' },
};

let allOrgs = [], activeTab = 'bacteria', searchQ = '';

function buildOrgList() {
  const list = [];
  Object.entries(MICRO).forEach(([cat, groups]) =>
    groups.forEach(grp =>
      (grp.organisms || []).forEach(o => list.push({ ...o, category: cat, groupName: grp.group }))
    )
  );
  return list;
}

function getFiltered() {
  if (searchQ) {
    return allOrgs.filter(o => {
      const blob = [o.name, o.gram, o.summary, o.disease, o.tx, o.pearl, o.virulence, o.lab_diagnosis]
        .filter(Boolean).join(' ').toLowerCase();
      return blob.includes(searchQ);
    });
  }
  return allOrgs.filter(o => o.category === activeTab);
}

function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function fmt(text, q) {
  if (!text) return '';
  let out = esc(text);
  out = out.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
  if (q) {
    const sq = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    out = out.replace(new RegExp(`(${sq})(?![^<]*>)`, 'gi'), '<mark class="search-hl">$1</mark>');
  }
  return out;
}

function fmtLines(text, q) {
  if (!text) return '';
  let out = fmt(text, q);
  // Split on \n line breaks embedded in the data
  const parts = out.split(/\n/);
  if (parts.length > 1) {
    return parts.map(p => p.trim()).filter(Boolean)
      .map(p => `<div class="info-line">${p}</div>`).join('');
  }
  // Fallback: split on period + space before a bold segment
  const parts2 = out.split(/(?<=\.) (?=<strong>)/);
  if (parts2.length > 1) {
    return parts2.map(p => `<div class="info-line">${p.trim()}</div>`).join('');
  }
  return `<div class="info-line">${out}</div>`;
}

function render() {
  const filtered = getFiltered();
  const isSearch = searchQ.length > 0;

  document.getElementById('results-meta').innerHTML = isSearch
    ? `<strong>${filtered.length}</strong> of ${allOrgs.length} organisms`
    : `<strong>${allOrgs.length}</strong> organisms`;

  renderTabs();
  renderPanels(filtered, isSearch);
}

function renderTabs() {
  let html = '';
  Object.entries(CAT_META).forEach(([cat, meta]) => {
    const isActive = (activeTab === cat && !searchQ);
    html += `<button class="cat-tab${isActive ? ' active' : ''}"
      onclick="switchTab('${cat}')" role="tab">
      <span class="tab-dot" style="background:${meta.color}"></span>${meta.label}
    </button>`;
  });
  document.getElementById('cat-tabs').innerHTML = html;
}

function renderPanels(filtered, isSearch) {
  const container = document.getElementById('panels-container');

  if (isSearch) {
    if (!filtered.length) {
      container.innerHTML = `<div class="cards-grid" style="margin-top:16px;">
        <div class="ref-empty">
          <div class="ref-empty-title">No results</div>
          <div class="ref-empty-sub">Try a different search term.</div>
        </div></div>`;
      return;
    }
    const cats = Object.keys(CAT_META).filter(c => filtered.some(o => o.category === c));
    container.innerHTML = cats.map(cat => {
      const catOrgs = filtered.filter(o => o.category === cat);
      if (!catOrgs.length) return '';
      const meta = CAT_META[cat];
      return `<div class="ref-panel" id="panel-${cat}">
        <div class="search-cat-label" style="color:${meta.color}">${meta.label}</div>
        <div class="cards-grid">${catOrgs.map(o => renderCard(o, meta.color)).join('')}</div>
      </div>`;
    }).join('');
    return;
  }

  if (!filtered.length) {
    container.innerHTML = `<div class="cards-grid" style="margin-top:16px;">
      <div class="ref-empty">
        <div class="ref-empty-title">Nothing here yet</div>
        <div class="ref-empty-sub">This category has no entries.</div>
      </div></div>`;
    return;
  }

  const cat = activeTab;
  const meta = CAT_META[cat];
  const groups = [...new Set(filtered.map(o => o.groupName))];

  const introHtml = `
    <div class="cat-intro" style="--cat-color:${meta.color}">
      <div class="cat-intro-title" style="color:${meta.color}">${meta.label}</div>
      <div class="cat-intro-desc">${meta.desc}</div>
    </div>`;

  const groupsHtml = groups.map((grp, gi) => {
    const grpOrgs = filtered.filter(o => o.groupName === grp);
    const gid = `grp-${cat}-${gi}`;
    return `<div class="group-section">
      <div class="class-group-header">
        <span class="class-label" style="color:${meta.color};border-color:${meta.color}40;background:${meta.color}12;">
          <span style="font-size:7px;">◆</span> ${grp}
        </span>
        <button class="group-expand-btn" onclick="toggleGroup('${gid}',this)">▼ Expand</button>
      </div>
      <div class="cards-grid" id="${gid}">
        ${grpOrgs.map(o => renderCard(o, meta.color)).join('')}
      </div>
    </div>`;
  }).join('');

  container.innerHTML = `<div class="ref-panel" id="panel-${cat}">${introHtml}${groupsHtml}</div>`;
}

function renderCard(o, catColor) {
  const color = catColor || CAT_META[o.category]?.color || 'var(--accent)';
  const q = searchQ;

  return `<div class="rcard" data-cat="${o.category}" style="border-left-color:${color}"
    tabindex="0" role="button" aria-label="${esc(o.name)}"
    onclick="openModal(this)">
    <div class="rcard-header">
      <div class="rcard-header-left">
        <div class="rcard-name">${fmt(o.name, q)}</div>
        ${o.gram ? `<div class="rcard-aka" style="color:${color}">${esc(o.gram)}</div>` : ''}
      </div>
      <button class="rcard-toggle" style="color:${color}" tabindex="-1" aria-hidden="true">▼</button>
    </div>
    <div class="rcard-summary">${fmt(o.summary, q)}</div>
  </div>`;
}

/* ── Modal ───────────────────────────────────────────────── */
let modalOrgs = [], modalIdx = 0;

function openModal(cardEl) {
  if (window.getSelection().toString().length > 0) return;
  const filtered = getFiltered();
  modalOrgs = filtered;
  const cat = cardEl.dataset.cat;
  const name = cardEl.querySelector('.rcard-name')?.textContent;
  const idx = modalOrgs.findIndex(o => o.category === cat && o.name === name);
  modalIdx = idx >= 0 ? idx : 0;
  showModal();
}

function showModal() {
  const o = modalOrgs[modalIdx];
  if (!o) return;
  const color = CAT_META[o.category]?.color || 'var(--accent)';
  const catLabel = CAT_META[o.category]?.label || o.category;
  const q = searchQ;

  document.getElementById('micro-modal').style.setProperty('--modal-accent', color);

  document.getElementById('modal-banner').innerHTML = `
    <span class="drug-modal-banner-cat" style="color:${color};border-color:${color}50;background:${color}12;">
      ${catLabel}
    </span>
    <span class="drug-modal-banner-sep" style="color:${color}">›</span>
    <span class="drug-modal-banner-grp" style="color:${color}">${o.groupName || ''}</span>
  `;
  document.getElementById('modal-title').innerHTML = fmt(o.name, q);

  const akaEl = document.getElementById('modal-aka');
  akaEl.textContent = o.gram || '';
  akaEl.style.color = color;
  akaEl.style.display = o.gram ? '' : 'none';

  document.getElementById('modal-summary').innerHTML = fmt(o.summary, q);
  document.getElementById('modal-counter').textContent = `${modalIdx + 1} / ${modalOrgs.length}`;

  const sections = [
    { label: 'Virulence',     cls: 'lbl-vir', val: o.virulence     },
    { label: 'Diseases',      cls: 'lbl-dis', val: o.disease       },
    { label: 'Lab Diagnosis', cls: 'lbl-dx',  val: o.lab_diagnosis },
    { label: 'Treatment',     cls: 'lbl-tx',  val: o.tx            },
  ].filter(s => s.val);

  document.getElementById('modal-body').innerHTML = `
    ${sections.map(s => `
      <div class="rcard-field">
        <span class="rcard-field-label ${s.cls}">${s.label}</span>
        <div class="rcard-field-text">${fmtLines(s.val, q)}</div>
      </div>`).join('')}
    ${o.pearl ? `
      <div class="rcard-pearl">
        <span class="pearl-diamond" style="color:${color}">◆</span>
        <div class="pearl-body">
          <div class="pearl-text"><span class="pearl-label" style="color:${color}">Step 1 Pearl:</span> ${fmt(o.pearl, q)}</div>
        </div>
      </div>` : ''}
  `;

  document.getElementById('modal-prev').disabled = modalIdx === 0;
  document.getElementById('modal-next').disabled = modalIdx === modalOrgs.length - 1;
  document.getElementById('modal-body').scrollTop = 0;
  document.getElementById('micro-modal-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('micro-modal-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

function modalNav(dir) {
  const next = modalIdx + dir;
  if (next >= 0 && next < modalOrgs.length) { modalIdx = next; showModal(); }
}

function handleModalOverlayClick(e) {
  if (e.target === document.getElementById('micro-modal-overlay')) closeModal();
}

function toggleGroup(gid, btn) {
  const grid = document.getElementById(gid);
  const hidden = grid.style.display === 'none';
  grid.style.display = hidden ? '' : 'none';
  btn.textContent = hidden ? '▲ Collapse' : '▼ Expand';
}

function switchTab(cat) {
  activeTab = cat;
  searchQ = '';
  document.getElementById('micro-search').value = '';
  render();
}

function onSearch() {
  searchQ = document.getElementById('micro-search').value.toLowerCase().trim();
  render();
}

document.addEventListener('keydown', e => {
  const search = document.getElementById('micro-search');
  const modalOpen = document.getElementById('micro-modal-overlay').classList.contains('open');

  if (modalOpen) {
    if (e.key === 'Escape') closeModal();
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { e.preventDefault(); modalNav(1); }
    if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   { e.preventDefault(); modalNav(-1); }
    return;
  }

  if (e.key === '/' && document.activeElement !== search) {
    e.preventDefault(); search.focus(); search.select();
  }
  if ((e.key === 'Enter' || e.key === ' ') && e.target.classList.contains('rcard')) {
    e.preventDefault(); openModal(e.target);
  }
  if (e.key === 'Escape' && searchQ) { search.value = ''; onSearch(); }
});

window.addEventListener('appAuthStateChanged', () => { if (allOrgs.length) render(); });
document.addEventListener('DOMContentLoaded', () => {
  allOrgs = buildOrgList();
  activeTab = 'bacteria';
  render();
});
</script>
</body>
</html>
