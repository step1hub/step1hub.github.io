<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="style.css"/>
<title>Drug Facts · Step 1 Hub</title>
</head>
<body>

<div class="petals" aria-hidden="true">
  <div class="petal"></div><div class="petal"></div><div class="petal"></div>
  <div class="petal"></div><div class="petal"></div><div class="petal"></div>
  <div class="petal"></div><div class="petal"></div><div class="petal"></div>
  <div class="petal"></div>
</div>

<script src="nav.js"></script>

<div class="wrap">

  <!-- Page header -->
  <header class="page-header">
    <div class="page-eyebrow">Pharmacology Reference</div>
    <h1 class="page-title">Drug <em>Facts</em></h1>
  </header>

  <!-- Filter bar: row 1 = search + system, row 2 = tier chips -->
  <div class="filter-bar">
    <div class="filter-row">
      <span class="filter-row-label">Search</span>
      <input class="search-input" type="text" id="drug-search"
             placeholder="Drug name, MOA, use, side effects…"
             oninput="filterDrugs()" autocomplete="off"/>
      <select class="filter-select" id="cat-filter" onchange="filterDrugs()">
        <option value="">All Systems</option>
        <option value="autonomic">Autonomic</option>
        <option value="cv">Cardiovascular</option>
        <option value="blood">Blood</option>
        <option value="neuro">Neurology / Psych</option>
        <option value="micro">Antimicrobials</option>
        <option value="gi">GI</option>
        <option value="endo">Endocrine</option>
        <option value="pulm">Pulmonary</option>
        <option value="onco">Oncology</option>
        <option value="toxicology">Toxicology</option>
      </select>
    </div>
    <div class="filter-row">
      <span class="filter-row-label">Tier</span>
      <button class="tier-chip active" data-tier=""  onclick="setTier(this,'')">All</button>
      <button class="tier-chip"        data-tier="1" onclick="setTier(this,'1')">Tier 1 — High Yield</button>
      <button class="tier-chip"        data-tier="2" onclick="setTier(this,'2')">Tier 2 — Important</button>
      <button class="tier-chip"        data-tier="3" onclick="setTier(this,'3')">Tier 3 — Know It</button>
    </div>
  </div>

  <!-- Results count -->
  <div class="results-meta" id="results-meta"></div>

  <!-- Drug card grid -->
  <div class="ref-grid" id="drug-grid"></div>

</div><!-- /wrap -->

<!-- ── Detail Modal ──────────────────────────────────────── -->
<div class="modal-overlay" id="drug-detail-modal">
  <div class="modal detail-modal">
    <div class="modal-header">
      <div style="flex:1;min-width:0;">
        <div class="modal-system" id="ddm-system"></div>
        <div class="modal-title"  id="ddm-name"></div>
        <div class="modal-aka"    id="ddm-aka"></div>
      </div>
      <div style="display:flex;align-items:flex-start;gap:10px;flex-shrink:0;">
        <span class="tier-badge" id="ddm-tier"></span>
        <button class="modal-close-btn" onclick="closeModal('drug-detail-modal')">&times;</button>
      </div>
    </div>
    <div class="modal-tags-row" id="ddm-tags"></div>
    <div id="ddm-content" style="max-height:62vh;overflow-y:auto;padding-right:4px;"></div>
    <div class="modal-btns" style="margin-top:20px;padding-top:16px;border-top:1px solid var(--border);">
      <button class="btn-cancel" onclick="closeModal('drug-detail-modal')">Close</button>
    </div>
  </div>
</div>

<script src="drug_data.js"></script>
<script src="app.js"></script>
<script>
let activeTier = '';
let allDrugs   = [];

const CAT_LABELS = {
  autonomic:'Autonomic', cv:'Cardiovascular', blood:'Blood',
  neuro:'Neuro / Psych', micro:'Antimicrobials', gi:'GI',
  endo:'Endocrine', pulm:'Pulmonary', onco:'Oncology',
  toxicology:'Toxicology'
};

/* ── Build flat list from nested DRUGS ─────────────────── */
function buildDrugList() {
  const list = [];
  Object.entries(DRUGS).forEach(([cat, groups]) =>
    groups.forEach(grp =>
      grp.drugs.forEach(d => list.push({ ...d, category: cat, groupName: grp.group }))
    )
  );
  return list;
}

/* ── Tier chip selection ────────────────────────────────── */
function setTier(btn, tier) {
  activeTier = tier;
  document.querySelectorAll('.tier-chip').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filterDrugs();
}

/* ── Filter ─────────────────────────────────────────────── */
function filterDrugs() {
  const q    = document.getElementById('drug-search').value.toLowerCase().trim();
  const cat  = document.getElementById('cat-filter').value;
  const tier = activeTier ? parseInt(activeTier) : null;

  const filtered = allDrugs.filter(d => {
    if (cat  && d.category !== cat) return false;
    if (tier && d.tier     !== tier) return false;
    if (q) {
      const blob = [d.name, d.aka, d.summary, d.moa, d.use, d.se,
                    (d.tags || []).join(' ')].join(' ').toLowerCase();
      if (!blob.includes(q)) return false;
    }
    return true;
  });

  renderGrid(filtered);

  const meta = document.getElementById('results-meta');
  if (filtered.length === allDrugs.length) {
    meta.innerHTML = `<strong>${allDrugs.length}</strong> drugs`;
  } else {
    meta.innerHTML = `<strong>${filtered.length}</strong> of ${allDrugs.length} drugs`;
  }
}

/* ── Render card grid ───────────────────────────────────── */
function renderGrid(list) {
  const grid = document.getElementById('drug-grid');

  if (!list.length) {
    grid.innerHTML = `
      <div class="empty-state">
        <div class="empty-state-title">No results</div>
        <div class="empty-state-sub">Try a different search or clear your filters.</div>
      </div>`;
    return;
  }

  grid.innerHTML = list.map(d => {
    const catLabel = CAT_LABELS[d.category] || d.category;
    const tags = (d.tags || []).slice(0, 3)
      .map(t => `<span class="ref-tag">${t}</span>`).join('');
    const payload = JSON.stringify(d).replace(/'/g, "&#39;");

    return `<div class="ref-card" data-tier="${d.tier}"
                 onclick='openDrugDetail(${payload})'>
      <div class="ref-card-top">
        <div class="ref-card-name">${d.name}</div>
        <span class="tier-badge tier-${d.tier}">T${d.tier}</span>
      </div>
      ${d.aka ? `<div class="ref-card-aka">${d.aka}</div>` : ''}
      <div class="ref-card-summary">${d.summary || ''}</div>
      <div class="ref-card-tags">
        <span class="ref-tag" style="font-weight:600;color:var(--ink2);">${catLabel}</span>
        ${tags}
      </div>
    </div>`;
  }).join('');
}

/* ── Open detail modal ──────────────────────────────────── */
function openDrugDetail(d) {
  const fmt = t => t ? t.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>') : '';

  document.getElementById('ddm-name').textContent   = d.name;
  document.getElementById('ddm-aka').textContent    = d.aka || '';
  document.getElementById('ddm-system').textContent =
    (CAT_LABELS[d.category] || '') + (d.groupName ? ' · ' + d.groupName : '');

  const tb = document.getElementById('ddm-tier');
  tb.textContent = `Tier ${d.tier}`;
  tb.className   = `tier-badge tier-${d.tier}`;

  document.getElementById('ddm-tags').innerHTML =
    (d.tags || []).map(t => `<span class="ref-tag">${t}</span>`).join('');

  const sections = [
    ['Mechanism',        d.moa],
    ['Clinical Use',     d.use],
    ['Side Effects',     d.se],
    ['Contraindications',d.ci],
    ['Pharmacokinetics', d.pk],
  ].filter(([, v]) => v);

  document.getElementById('ddm-content').innerHTML =
    sections.map(([label, val]) =>
      `<div class="drug-row">
         <span class="drug-label">${label}</span>
         <div class="drug-text">${fmt(val)}</div>
       </div>`
    ).join('') +
    (d.pearl
      ? `<div class="pearl-box">
           <span class="drug-label">Clinical Pearl</span>
           <div class="drug-text">${fmt(d.pearl)}</div>
         </div>`
      : '');

  openModal('drug-detail-modal');
}

/* ── Init ───────────────────────────────────────────────── */
document.addEventListener('DOMContentLoaded', () => {
  allDrugs = buildDrugList();
  filterDrugs();
});
</script>
</body>
</html>
