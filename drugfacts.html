<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="style.css"/>
<title>Drug Facts · Step 1 Hub</title>
<style>
:root { --accent: var(--sakura2); --accent-light: var(--sakura-light); --accent-glow: rgba(196,80,94,.12); }

.ref-page-header { padding: 40px 0 0; display: flex; align-items: flex-end; justify-content: space-between; gap: 20px; flex-wrap: wrap; }
.ref-page-eyebrow { font-size: 10px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: var(--accent); opacity: .8; margin-bottom: 10px; }
.ref-page-title { font-family: 'Playfair Display', serif; font-size: clamp(28px,3.8vw,44px); font-weight: 700; line-height: 1.1; letter-spacing: -0.4px; color: var(--ink); margin-bottom: 6px; }
.ref-page-title em { font-style: italic; color: var(--accent); }
.ref-count { font-size: 12px; color: var(--muted); align-self: flex-end; padding-bottom: 6px; white-space: nowrap; }
.ref-count strong { color: var(--ink2); font-weight: 600; }

.ref-search-row { padding: 16px 0 0; }
.ref-search-wrap { position: relative; max-width: 480px; }
.ref-search-icon { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); font-size: 13px; color: var(--dim); pointer-events: none; }
.ref-search-input { width: 100%; padding: 9px 14px 9px 36px; border: 1.5px solid var(--border); border-radius: 99px; background: var(--surface); font-size: 13px; color: var(--ink); font-family: 'DM Sans', sans-serif; outline: none; transition: border-color .15s, box-shadow .15s; }
.ref-search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
.ref-search-input::placeholder { color: var(--dim); }

.ref-tab-bar { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 18px; padding-bottom: 10px; border-bottom: 1px solid var(--border2); }
.ref-tab { padding: 5px 13px; font-size: 11.5px; font-weight: 600; color: var(--muted); border-radius: 99px; border: 1.5px solid transparent; cursor: pointer; white-space: nowrap; background: transparent; font-family: 'DM Sans', sans-serif; transition: color .15s, background .15s, border-color .15s; }
.ref-tab:hover { color: var(--ink2); background: var(--surface2); }
.ref-tab.active { color: var(--accent); background: var(--accent-light); border-color: color-mix(in srgb, var(--accent) 30%, transparent); }
.ref-tab.all-tab { font-weight: 700; }

.group-section { margin-bottom: 8px; }
.group-header { display: flex; align-items: center; gap: 10px; margin: 24px 0 8px; }
.group-title { font-size: 10px; font-weight: 700; letter-spacing: 1.8px; text-transform: uppercase; color: var(--muted); white-space: nowrap; }
.group-line { flex: 1; height: 1px; background: var(--border2); }
.group-badge { font-size: 10px; font-weight: 600; color: var(--dim); }

.group-actions { display: flex; gap: 6px; justify-content: flex-end; margin-bottom: 8px; }
.expand-btn { font-size: 10px; font-weight: 600; color: var(--muted); background: transparent; border: 1.5px solid var(--border); border-radius: 99px; padding: 3px 11px; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: color .14s, border-color .14s, background .14s; }
.expand-btn:hover { color: var(--accent); border-color: color-mix(in srgb, var(--accent) 40%, transparent); background: var(--accent-light); }

/* KEY FIX: align-items:start so cards don't stretch; no grid-column span on expanded */
.cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 8px; margin-bottom: 4px; align-items: start; }

.rcard { background: var(--surface); border: 1.5px solid var(--border); border-radius: 10px; padding: 14px 16px; cursor: pointer; position: relative; transition: border-color .15s, box-shadow .15s; }
.rcard::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; border-radius: 10px 0 0 10px; background: var(--accent); opacity: 0; transition: opacity .15s; }
.rcard:hover { border-color: color-mix(in srgb, var(--accent) 35%, var(--border)); box-shadow: 0 2px 10px rgba(42,31,26,.07); }
.rcard.expanded { border-color: color-mix(in srgb, var(--accent) 45%, var(--border)); box-shadow: 0 3px 14px rgba(42,31,26,.09); }
.rcard.expanded::before { opacity: 1; }
.rcard:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

.rcard-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
.rcard-header-left { flex: 1; min-width: 0; }
.rcard-name { font-family: 'Playfair Display', serif; font-size: 14.5px; font-weight: 600; line-height: 1.3; color: var(--ink); }
.rcard-aka { font-size: 11px; color: var(--muted); font-style: italic; line-height: 1.4; margin-top: 3px; }
.rcard-summary { font-size: 12px; color: var(--ink2); line-height: 1.55; margin-top: 7px; }

.rcard-toggle { flex-shrink: 0; background: none; border: none; cursor: pointer; color: var(--dim); padding: 1px 0 0 2px; font-size: 12px; line-height: 1; transition: color .14s, transform .2s ease; align-self: flex-start; margin-top: 1px; }
.rcard.expanded .rcard-toggle { transform: rotate(180deg); color: var(--accent); }

.rcard-detail { overflow: hidden; max-height: 0; opacity: 0; transition: max-height .3s cubic-bezier(.4,0,.2,1), opacity .2s ease; }
.rcard.expanded .rcard-detail { max-height: 2000px; opacity: 1; }
.rcard-detail-inner { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border2); }

/* Fields: simple label + text, dividers between — NO background boxes */
.rcard-field { padding: 9px 0; }
.rcard-field:first-child { padding-top: 0; }
.rcard-field + .rcard-field { border-top: 1px solid var(--border2); }
.rcard-field-label { display: block; font-size: 9px; font-weight: 700; letter-spacing: 1.8px; text-transform: uppercase; color: var(--accent); margin-bottom: 4px; }
.rcard-field-text { font-size: 13px; color: var(--ink2); line-height: 1.65; }
.rcard-field-text strong { color: var(--ink); font-weight: 600; }

.rcard-pearl { margin-top: 10px; padding: 10px 12px; border-radius: 8px; background: var(--accent-light); border: 1px solid color-mix(in srgb, var(--accent) 22%, transparent); }
.rcard-pearl .rcard-field-label { margin-bottom: 4px; }
.rcard-pearl .rcard-field-text { font-size: 12.5px; }

mark.search-hl { background: color-mix(in srgb, var(--accent) 16%, transparent); color: var(--ink); border-radius: 2px; padding: 0 2px; font-style: normal; }

.ref-empty { grid-column: 1 / -1; padding: 48px 24px; text-align: center; }
.ref-empty-title { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 600; color: var(--ink2); margin-bottom: 6px; }
.ref-empty-sub { font-size: 13px; color: var(--muted); }

@media (min-width: 900px) {
  .ref-tab-bar { flex-wrap: nowrap; overflow-x: auto; scrollbar-width: none; }
  .ref-tab-bar::-webkit-scrollbar { display: none; }
  .ref-tab { font-size: 11px; padding: 5px 11px; flex-shrink: 0; }
}
@media (min-width: 1100px) { .ref-tab { font-size: 11.5px; padding: 5px 13px; } }
@media (max-width: 640px) { .cards-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<div class="petals" aria-hidden="true">
  <div class="petal"></div><div class="petal"></div><div class="petal"></div>
  <div class="petal"></div><div class="petal"></div><div class="petal"></div>
  <div class="petal"></div><div class="petal"></div><div class="petal"></div>
  <div class="petal"></div>
</div>

<script src="nav.js"></script>

<div class="wrap">
  <div class="ref-page-header">
    <div>
      <div class="ref-page-eyebrow">Pharmacology Reference</div>
      <h1 class="ref-page-title">Drug <em>Facts</em></h1>
    </div>
    <div class="ref-count" id="results-meta"></div>
  </div>

  <div class="ref-search-row">
    <div class="ref-search-wrap">
      <span class="ref-search-icon">🔍</span>
      <input class="ref-search-input" type="text" id="drug-search"
             placeholder="Search drugs, mechanisms, side effects…"
             oninput="onSearch()" autocomplete="off"/>
    </div>
  </div>

  <div class="ref-tab-bar" id="cat-tabs" role="tablist"></div>
  <div id="panels-container"></div>
</div>

<script src="drug_data.js"></script>
<script src="app.js"></script>
<script>
const CAT_META = {
  autonomic:  { label: 'Autonomic'      },
  cv:         { label: 'Cardiovascular' },
  blood:      { label: 'Blood'          },
  neuro:      { label: 'Neuro / Psych'  },
  micro:      { label: 'Antimicrobials' },
  gi:         { label: 'GI / Hepatic'   },
  endo:       { label: 'Endocrine'      },
  pulm:       { label: 'Pulmonary'      },
  onco:       { label: 'Oncology'       },
  toxicology: { label: 'Toxicology'     },
};

let allDrugs = [], activeTab = 'all', searchQ = '';

function buildDrugList() {
  const list = [];
  Object.entries(DRUGS).forEach(([cat, groups]) =>
    groups.forEach(grp =>
      grp.drugs.forEach(d => list.push({ ...d, category: cat, groupName: grp.group }))
    )
  );
  return list;
}

function getFiltered() {
  return allDrugs.filter(d => {
    if (activeTab !== 'all' && d.category !== activeTab) return false;
    if (searchQ) {
      const blob = [d.name,d.aka,d.summary,d.moa,d.use,d.se,d.ci,d.pk,d.pearl]
        .filter(Boolean).join(' ').toLowerCase();
      if (!blob.includes(searchQ)) return false;
    }
    return true;
  });
}

function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function fmt(text, q) {
  if (!text) return '';
  let out = esc(text);
  out = out.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
  if (q) {
    const sq = q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
    out = out.replace(new RegExp(`(${sq})(?![^<]*>)`,'gi'), '<mark class="search-hl">$1</mark>');
  }
  return out;
}

function render() {
  const filtered = getFiltered();
  document.getElementById('results-meta').innerHTML = filtered.length === allDrugs.length
    ? `<strong>${allDrugs.length}</strong> drugs`
    : `<strong>${filtered.length}</strong> of ${allDrugs.length} drugs`;
  renderTabs(filtered);
  renderPanels(filtered);
}

function renderTabs(filtered) {
  let html = `<button class="ref-tab all-tab${activeTab==='all'?' active':''}" onclick="switchTab('all')" role="tab">All</button>`;
  Object.keys(CAT_META).forEach(cat => {
    if (searchQ && !filtered.some(d => d.category === cat)) return;
    html += `<button class="ref-tab${activeTab===cat?' active':''}" onclick="switchTab('${cat}')" role="tab">${CAT_META[cat].label}</button>`;
  });
  document.getElementById('cat-tabs').innerHTML = html;
}

function renderPanels(filtered) {
  const container = document.getElementById('panels-container');
  if (!filtered.length) {
    container.innerHTML = `<div class="cards-grid" style="margin-top:16px;"><div class="ref-empty"><div class="ref-empty-title">No results</div><div class="ref-empty-sub">Try a different search term.</div></div></div>`;
    return;
  }
  const cats = activeTab === 'all'
    ? Object.keys(CAT_META).filter(c => filtered.some(d => d.category === c))
    : [activeTab];

  container.innerHTML = cats.map(cat => {
    const catDrugs = filtered.filter(d => d.category === cat);
    if (!catDrugs.length) return '';
    const groups = [...new Set(catDrugs.map(d => d.groupName))];
    return `<div class="ref-panel" id="panel-${cat}">${
      groups.map((grp, gi) => {
        const grpDrugs = catDrugs.filter(d => d.groupName === grp);
        const gid = `grp-${cat}-${gi}`;
        return `<div class="group-section">
          <div class="group-header">
            <span class="group-title">${grp}</span>
            <div class="group-line"></div>
            <span class="group-badge">${grpDrugs.length}</span>
          </div>
          <div class="group-actions">
            <button class="expand-btn" onclick="expandAll('${gid}')">Expand all</button>
            <button class="expand-btn" onclick="collapseAll('${gid}')">Collapse all</button>
          </div>
          <div class="cards-grid" id="${gid}">${grpDrugs.map(d => renderCard(d)).join('')}</div>
        </div>`;
      }).join('')
    }</div>`;
  }).join('');
}

function renderCard(d) {
  const q = searchQ;
  const sections = [
    ['Mechanism',         d.moa],
    ['Clinical Use',      d.use],
    ['Side Effects',      d.se],
    ['Contraindications', d.ci],
    ['Pharmacokinetics',  d.pk],
  ].filter(([,v]) => v);

  return `<div class="rcard" tabindex="0" role="button" aria-label="${esc(d.name)}" aria-expanded="false" onclick="toggleCard(this)">
    <div class="rcard-header">
      <div class="rcard-header-left">
        <div class="rcard-name">${fmt(d.name,q)}</div>
        ${d.aka ? `<div class="rcard-aka">${fmt(d.aka,q)}</div>` : ''}
      </div>
      <button class="rcard-toggle" tabindex="-1" aria-hidden="true">&#8964;</button>
    </div>
    <div class="rcard-summary">${fmt(d.summary,q)}</div>
    <div class="rcard-detail">
      <div class="rcard-detail-inner">
        ${sections.map(([label,val]) => `<div class="rcard-field">
            <span class="rcard-field-label">${label}</span>
            <div class="rcard-field-text">${fmt(val,q)}</div>
          </div>`).join('')}
        ${d.pearl ? `<div class="rcard-pearl">
            <span class="rcard-field-label">Clinical Pearl</span>
            <div class="rcard-field-text">${fmt(d.pearl,q)}</div>
          </div>` : ''}
      </div>
    </div>
  </div>`;
}

function toggleCard(el) {
  if (event && event.target.closest && event.target.closest('.rcard-detail-inner') && el.classList.contains('expanded')) return;
  const expanding = !el.classList.contains('expanded');
  el.classList.toggle('expanded', expanding);
  el.setAttribute('aria-expanded', String(expanding));
}

function expandAll(gid) {
  document.querySelectorAll(`#${gid} .rcard`).forEach(el => { el.classList.add('expanded'); el.setAttribute('aria-expanded','true'); });
}
function collapseAll(gid) {
  document.querySelectorAll(`#${gid} .rcard`).forEach(el => { el.classList.remove('expanded'); el.setAttribute('aria-expanded','false'); });
}

function switchTab(cat) {
  activeTab = cat;
  render();
  /* No scroll — user stays where they are */
}

function onSearch() {
  searchQ = document.getElementById('drug-search').value.toLowerCase().trim();
  if (searchQ) activeTab = 'all';
  render();
}

document.addEventListener('keydown', e => {
  if ((e.key==='Enter'||e.key===' ') && e.target.classList.contains('rcard')) { e.preventDefault(); toggleCard(e.target); }
  if (e.key==='Escape') {
    if (document.activeElement.classList.contains('expanded')) toggleCard(document.activeElement);
    else if (searchQ) { document.getElementById('drug-search').value=''; onSearch(); }
  }
});

window.addEventListener('appAuthStateChanged', () => { if (allDrugs.length) render(); });
document.addEventListener('DOMContentLoaded', () => { allDrugs = buildDrugList(); activeTab = 'all'; render(); });
</script>
</body>
</html>
