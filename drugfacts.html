<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="style.css"/>
<title>Drug Facts · Step 1 Hub</title>
<style>
:root {
  --accent:       var(--sakura2);
  --accent-light: var(--sakura-light);
  --accent-glow:  rgba(196,80,94,.10);

  --c-autonomic:  #c4505e;
  --c-cv:         #9e3a5a;
  --c-blood:      #7a3a8a;
  --c-neuro:      #5a4490;
  --c-micro:      #3a6e7a;
  --c-gi:         #9e6a3d;
  --c-endo:       #c08c3e;
  --c-pulm:       #3d6e8a;
  --c-onco:       #3a5a6e;
  --c-toxicology: #a63e3e;
}

/* ── Page header ─────────────────────────────────────────── */
.ref-page-header {
  padding: 36px 0 20px;
  display: flex; align-items: flex-end; justify-content: space-between;
  gap: 20px; flex-wrap: wrap;
}
.ref-page-eyebrow {
  font-size: 10px; font-weight: 700; letter-spacing: 3px;
  text-transform: uppercase; color: var(--accent);
  opacity: .85; margin-bottom: 10px;
  font-family: 'DM Sans', sans-serif;
}
.ref-page-title {
  font-family: 'Playfair Display', serif;
  font-size: clamp(30px, 4vw, 46px); font-weight: 700;
  line-height: 1.1; letter-spacing: -0.5px; color: var(--ink);
  margin-bottom: 0;
}
.ref-page-title em { font-style: italic; color: var(--accent); }
.ref-page-sub { display: none; }
.ref-count {
  font-size: 12px; color: var(--muted);
  align-self: flex-end; padding-bottom: 4px; white-space: nowrap;
}
.ref-count strong { color: var(--ink2); font-weight: 600; }

/* ── Search ──────────────────────────────────────────────── */
.ref-search-row { padding: 18px 0 0; }
.ref-search-wrap { position: relative; max-width: 480px; }
.ref-search-icon {
  position: absolute; left: 13px; top: 50%; transform: translateY(-50%);
  pointer-events: none; display: flex; align-items: center;
}
.ref-search-svg {
  width: 13px; height: 13px;
  stroke: var(--dim); fill: none; stroke-width: 2; stroke-linecap: round;
}
.ref-search-input {
  width: 100%; padding: 9px 14px 9px 36px;
  border: 1.5px solid var(--border); border-radius: 99px;
  background: var(--surface); font-size: 13px; color: var(--ink);
  font-family: 'DM Sans', sans-serif;
  outline: none; transition: border-color .15s, box-shadow .15s;
}
.ref-search-input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}
.ref-search-input::placeholder { color: var(--dim); }

/* ── Category tabs ───────────────────────────────────────── */
.cat-tab-bar {
  display: flex;
  flex-wrap: wrap;
  gap: 0;
  margin-top: 18px;
  border-bottom: 1px solid var(--border2);
}
.cat-tab {
  padding: 9px 12px;
  font-family: 'DM Sans', sans-serif; font-size: 10px;
  letter-spacing: 0.3px; text-transform: uppercase; font-weight: 600;
  color: var(--muted); border: none;
  border-bottom: 2px solid transparent;
  cursor: pointer; white-space: nowrap;
  background: transparent;
  transition: color .15s, border-color .15s;
  display: flex; align-items: center; gap: 5px;
  flex-shrink: 0;
}
.cat-tab:hover { color: var(--ink2); }
.cat-tab.active { color: var(--ink); border-bottom-color: var(--accent); }
.tab-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

/* ── Category intro ──────────────────────────────────────── */
.cat-intro {
  border-radius: 12px;
  padding: 16px 20px;
  margin: 18px 0 22px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-left: 4px solid var(--cat-color, var(--accent));
}
.cat-intro-title {
  font-family: 'Playfair Display', serif;
  font-size: 22px; font-weight: 700; margin-bottom: 5px; letter-spacing: -0.4px;
}
.cat-intro-desc { font-size: 12.5px; color: var(--muted); line-height: 1.6; }

/* ── Group row ───────────────────────────────────────────── */
.group-section { margin-bottom: 28px; }
.class-group-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 11px;
}
.class-label {
  font-family: 'DM Sans', sans-serif; font-size: 10px; font-weight: 600;
  letter-spacing: 0.3px; text-transform: uppercase; padding: 5px 12px;
  display: inline-flex; align-items: center; gap: 6px;
  border-radius: 99px; color: var(--ink2);
  background: var(--surface); border: 1.5px solid var(--border);
  box-shadow: 0 1px 3px rgba(42,31,26,.05);
}
.class-label::before { content: '◆'; font-size: 6px; color: var(--accent); }

.group-expand-btn {
  font-family: 'DM Mono', monospace; font-size: 8px; letter-spacing: 1px;
  text-transform: uppercase; padding: 5px 12px; border-radius: 99px;
  border: 1.5px solid var(--border); background: transparent;
  color: var(--muted); cursor: pointer; white-space: nowrap; flex-shrink: 0;
  transition: background .15s, color .15s, border-color .15s;
}
.group-expand-btn:hover { background: var(--sakura-light); color: var(--sakura2); border-color: var(--sakura); }

/* ── Card grid ───────────────────────────────────────────── */
.cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 10px;
  align-items: stretch;
}

/* Expanded card stays in its own column — no full-width */
.rcard { grid-column: span 1; }

/* ── Drug card ───────────────────────────────────────────── */
.rcard {
  background: var(--surface);
  border: 1px solid var(--border);
  border-left: 3px solid var(--accent);
  border-radius: 12px; overflow: hidden;
  cursor: pointer;
  transition: box-shadow .18s ease;
  box-shadow: 0 1px 3px rgba(42,31,26,.04);
}
.rcard:hover { box-shadow: 0 4px 18px rgba(42,31,26,.10); }
.rcard.expanded { box-shadow: 0 4px 20px rgba(42,31,26,.12); }
.rcard:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

/* Per-category left borders */
.rcard[data-cat="autonomic"]  { border-left-color: var(--c-autonomic); }
.rcard[data-cat="cv"]         { border-left-color: var(--c-cv); }
.rcard[data-cat="blood"]      { border-left-color: var(--c-blood); }
.rcard[data-cat="neuro"]      { border-left-color: var(--c-neuro); }
.rcard[data-cat="micro"]      { border-left-color: var(--c-micro); }
.rcard[data-cat="gi"]         { border-left-color: var(--c-gi); }
.rcard[data-cat="endo"]       { border-left-color: var(--c-endo); }
.rcard[data-cat="pulm"]       { border-left-color: var(--c-pulm); }
.rcard[data-cat="onco"]       { border-left-color: var(--c-onco); }
.rcard[data-cat="toxicology"] { border-left-color: var(--c-toxicology); }

/* ── Card header ─────────────────────────────────────────── */
.rcard-header {
  padding: 13px 14px 0;
  display: flex; justify-content: space-between; align-items: flex-start; gap: 8px;
}
.rcard-header-left { flex: 1; min-width: 0; }

.rcard-name {
  font-family: 'Playfair Display', serif;
  font-size: 15px; font-weight: 700; line-height: 1.2;
  color: var(--ink); letter-spacing: -0.2px;
}
.rcard-aka {
  font-family: 'DM Mono', monospace;
  font-size: 9px; color: var(--dim); font-style: normal;
  line-height: 1.5; margin-top: 4px; word-break: break-word;
}
.rcard-aka .dot-sep { margin: 0 3px; color: var(--border2); }

.rcard-toggle {
  flex-shrink: 0; background: none; border: none; cursor: pointer;
  color: var(--dim); font-size: 9px; line-height: 1;
  padding: 3px 0 0 4px; align-self: flex-start;
  font-family: 'DM Mono', monospace;
  transition: color .14s, transform .2s ease;
}
.rcard.expanded .rcard-toggle { transform: rotate(180deg); color: var(--accent); }

.rcard-summary {
  padding: 6px 14px 13px;
  font-size: 12px; color: var(--ink2); line-height: 1.58;
}

/* ── Expanded detail ─────────────────────────────────────── */
.rcard-detail {
  display: none;
  border-top: 1px solid var(--border2);
}
.rcard.expanded .rcard-detail {
  display: block;
  animation: fadeSlide .18s ease;
}
@keyframes fadeSlide {
  from { opacity: 0; transform: translateY(-3px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── Field: pill label + plain text, separated by lines ───── */
.rcard-field {
  padding: 10px 14px;
  border-bottom: 1px solid var(--border2);
}
.rcard-field:last-of-type { border-bottom: none; }

.rcard-field-label {
  font-family: 'DM Sans', sans-serif;
  font-size: 9px; letter-spacing: 0.4px; text-transform: uppercase;
  padding: 3px 9px; border-radius: 99px;
  display: inline-block; margin-bottom: 7px;
  border: 1px solid; font-weight: 700;
}
.lbl-moa { background: #eef2fb; color: #3a5080; border-color: #c0cef0; }
.lbl-use { background: #eaf5ef; color: #2e6845; border-color: #aadcc0; }
.lbl-se  { background: #fdeef2; color: #8a2844; border-color: #e8afc0; }
.lbl-ci  { background: #fdf4ee; color: #7a3e18; border-color: #e4c0a0; }
.lbl-pk  { background: #f2effe; color: #4a3890; border-color: #c0b0e8; }

.rcard-field-text {
  font-size: 12px; color: var(--ink2); line-height: 1.65;
}
.rcard-field-text strong { color: var(--ink); font-weight: 600; }

.info-line { line-height: 1.65; font-size: 12px; color: var(--ink2); }
.info-line + .info-line { margin-top: 4px; }
.info-line strong { color: var(--ink); font-weight: 600; }

/* ── Pearl box ───────────────────────────────────────────── */
.rcard-pearl {
  display: flex; gap: 9px; align-items: flex-start;
  background: var(--accent-light);
  border-top: 1px solid rgba(196,80,94,.15);
  padding: 12px 14px;
  margin: 0;
}
.pearl-diamond {
  color: var(--accent); font-size: 11px; flex-shrink: 0; margin-top: 2px;
  line-height: 1;
}
.pearl-body { flex: 1; min-width: 0; }
.pearl-label {
  font-family: 'DM Sans', sans-serif; font-size: 9px; letter-spacing: 0.3px;
  text-transform: uppercase; color: var(--accent); display: inline;
  font-weight: 700; margin-right: 4px;
}
.pearl-text { font-size: 12px; color: var(--ink2); line-height: 1.65; display: inline; }
.pearl-text strong { color: var(--accent); font-weight: 600; }

/* ── Search results header ───────────────────────────────── */
.search-cat-label {
  font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 2px;
  text-transform: uppercase; margin: 20px 0 10px;
  display: flex; align-items: center; gap: 8px;
}
.search-cat-label::after {
  content: ''; flex: 1; height: 1px; background: var(--border);
}

/* ── Search highlight ────────────────────────────────────── */
mark.search-hl {
  background: rgba(196,80,94,.14);
  color: var(--ink); border-radius: 2px; padding: 0 2px;
}

/* ── Empty state ─────────────────────────────────────────── */
.ref-empty { grid-column: 1/-1; padding: 52px 24px; text-align: center; }
.ref-empty-title {
  font-family: 'Playfair Display', serif;
  font-size: 17px; font-weight: 600; color: var(--ink2); margin-bottom: 5px;
}
.ref-empty-sub { font-size: 13px; color: var(--muted); }

/* ── Mobile ──────────────────────────────────────────────── */
@media (max-width: 600px) {
  .cards-grid { grid-template-columns: 1fr; }
  .ref-page-header { padding-top: 20px; }
  .cat-tab { padding: 8px 10px; font-size: 8px; }
}
</style>
</head>
<body>

<div class="petals" aria-hidden="true">
  <div class="petal"></div><div class="petal"></div><div class="petal"></div>
  <div class="petal"></div><div class="petal"></div><div class="petal"></div>
  <div class="petal"></div><div class="petal"></div><div class="petal"></div>
  <div class="petal"></div>
</div>

<script src="nav.js"></script>

<div class="wrap">

  <div class="ref-page-header">
    <div>
      <div class="ref-page-eyebrow">Pharmacology Reference</div>
      <h1 class="ref-page-title">Drug <em>Facts</em></h1>
      <p class="ref-page-sub">MOA · Uses · Side Effects · PK · Clinical Pearls</p>
    </div>
    <div class="ref-count" id="results-meta"></div>
  </div>

  <div class="ref-search-row">
    <div class="ref-search-wrap">
      <span class="ref-search-icon">
        <svg class="ref-search-svg" viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="22" y2="22"/>
        </svg>
      </span>
      <input class="ref-search-input" type="text" id="drug-search"
             placeholder="Search drug, class, mechanism, side effect…"
             oninput="onSearch()" autocomplete="off"/>
    </div>
  </div>

  <div class="cat-tab-bar" id="cat-tabs" role="tablist"></div>
  <div id="panels-container"></div>

</div>

<script src="drug_data.js"></script>
<script src="app.js"></script>
<script>
const CAT_META = {
  autonomic:  { label: 'Autonomics',     color: '#c4505e', desc: 'Parasympathetic (cholinergic) and sympathetic (adrenergic) drug classes. Master receptor subtypes first — M1/M2/M3, α1/α2, β1/β2 — and the drugs fall into place. High-yield for organ-specific side effects and clinical applications.' },
  cv:         { label: 'Cardio & Renal', color: '#9e3a5a', desc: 'The most tested drug system on Step 1. Know ACEi/ARBs cold — they appear in HF, HTN, CKD, and post-MI vignettes. Antiarrhythmic classes: think ion channels first, then drugs. Diuretic electrolyte effects are guaranteed questions.' },
  blood:      { label: 'Hematology',     color: '#7a3a8a', desc: 'Anticoagulants appear on nearly every Step 1 exam — know reversal agents cold. Heparin-induced thrombocytopenia (HIT) is a classic trap. NSAIDs are the most-prescribed drugs in medicine; their mechanism and GI/renal toxicity are ubiquitous.' },
  neuro:      { label: 'Neuro & Psych',  color: '#5a4490', desc: 'Psych block is massive on Step 1. Memorize antidepressant side effect profiles — TCA overdose, SSRI serotonin syndrome, and bupropion seizures appear constantly. Antipsychotic EPS and NMS are classic vignettes. Lithium toxicity has a narrow therapeutic window.' },
  micro:      { label: 'Microbiology',   color: '#3a6e7a', desc: 'Organized by mechanism: cell wall inhibitors → protein synthesis → DNA/folate → cell membrane. For each drug know its unique toxicity, not just its coverage. Antibiotic-associated C. diff (clindamycin, fluoroquinolones, cephalosporins) is a perennial vignette.' },
  gi:         { label: 'GI & Motility',  color: '#9e6a3d', desc: 'Focus on acid suppression, motility agents, and mucosal protection. High-yield for C. difficile associations and metabolic interactions with PPIs.' },
  endo:       { label: 'Endo & Repro',   color: '#c08c3e', desc: 'Master the hypothalamic-pituitary axes, diabetes management, and reproductive hormones. High-yield for Step 1 feedback loops and drug-induced endocrine disorders.' },
  pulm:       { label: 'Pulmonary',      color: '#3d6e8a', desc: 'Asthma step therapy is heavily tested — know which drugs are for acute relief vs. maintenance. Antihistamine receptor subtypes (H1 vs H2) determine organ effects and drug indication.' },
  onco:       { label: 'Oncology',       color: '#3a5a6e', desc: 'Step 1 tests toxicities more than mechanisms. Every chemotherapy drug has one unique, memorable toxicity — bleomycin → pulmonary fibrosis, cisplatin → nephrotoxicity/ototoxicity, vincristine → peripheral neuropathy (not bone marrow suppression).' },
  toxicology: { label: 'Toxicology',     color: '#a63e3e', desc: 'Crucial reversal agents and toxidromes. Focus on the mechanism of toxicity and the logic of the chosen antidote. Know the classic overdose presentations cold.' },
};

let allDrugs = [], activeTab = 'autonomic', searchQ = '';

function buildDrugList() {
  const list = [];
  Object.entries(DRUGS).forEach(([cat, groups]) =>
    groups.forEach(grp =>
      grp.drugs.forEach(d => list.push({ ...d, category: cat, groupName: grp.group }))
    )
  );
  return list;
}

function getFiltered() {
  if (searchQ) {
    return allDrugs.filter(d => {
      const blob = [d.name, d.aka, d.summary, d.moa, d.use, d.se, d.ci, d.pk, d.pearl]
        .filter(Boolean).join(' ').toLowerCase();
      return blob.includes(searchQ);
    });
  }
  return allDrugs.filter(d => d.category === activeTab);
}

function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function fmt(text, q) {
  if (!text) return '';
  let out = esc(text);
  out = out.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
  if (q) {
    const sq = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    out = out.replace(new RegExp(`(${sq})(?![^<]*>)`, 'gi'), '<mark class="search-hl">$1</mark>');
  }
  return out;
}

function fmtLines(text, q) {
  if (!text) return '';
  let out = fmt(text, q);
  const parts = out.split(/\.\s+(?=[A-Z↑↓(★◇<\[0-9])/);
  if (parts.length <= 1) return `<div class="info-line">${out}</div>`;
  return parts.map((p, i) => {
    let line = p.trim();
    if (i < parts.length - 1 && !line.endsWith('.') && !line.endsWith('>') && !line.endsWith(')'))
      line += '.';
    return `<div class="info-line">${line}</div>`;
  }).join('');
}

function render() {
  const filtered = getFiltered();
  const isSearch = searchQ.length > 0;

  document.getElementById('results-meta').innerHTML = isSearch
    ? `<strong>${filtered.length}</strong> of ${allDrugs.length} drugs`
    : `<strong>${allDrugs.length}</strong> drugs`;

  renderTabs();
  renderPanels(filtered, isSearch);
}

function renderTabs() {
  let html = '';
  Object.entries(CAT_META).forEach(([cat, meta]) => {
    const isActive = (activeTab === cat && !searchQ);
    html += `<button class="cat-tab${isActive ? ' active' : ''}"
      onclick="switchTab('${cat}')" role="tab">
      <span class="tab-dot" style="background:${meta.color}"></span>${meta.label}
    </button>`;
  });
  document.getElementById('cat-tabs').innerHTML = html;
}

function renderPanels(filtered, isSearch) {
  const container = document.getElementById('panels-container');

  if (isSearch) {
    if (!filtered.length) {
      container.innerHTML = `<div class="cards-grid" style="margin-top:16px;">
        <div class="ref-empty">
          <div class="ref-empty-title">No results</div>
          <div class="ref-empty-sub">Try a different search term.</div>
        </div></div>`;
      return;
    }
    const cats = Object.keys(CAT_META).filter(c => filtered.some(d => d.category === c));
    container.innerHTML = cats.map(cat => {
      const catDrugs = filtered.filter(d => d.category === cat);
      if (!catDrugs.length) return '';
      const meta = CAT_META[cat];
      return `<div class="ref-panel" id="panel-${cat}">
        <div class="search-cat-label" style="color:${meta.color}">${meta.label}</div>
        <div class="cards-grid">${catDrugs.map(d => renderCard(d)).join('')}</div>
      </div>`;
    }).join('');
    return;
  }

  if (!filtered.length) {
    container.innerHTML = `<div class="cards-grid" style="margin-top:16px;">
      <div class="ref-empty">
        <div class="ref-empty-title">Nothing here yet</div>
        <div class="ref-empty-sub">This category has no entries.</div>
      </div></div>`;
    return;
  }

  const cat = activeTab;
  const meta = CAT_META[cat];
  const groups = [...new Set(filtered.map(d => d.groupName))];

  const introHtml = `
    <div class="cat-intro" style="--cat-color:${meta.color}">
      <div class="cat-intro-title" style="color:${meta.color}">${meta.label}</div>
      <div class="cat-intro-desc">${meta.desc}</div>
    </div>`;

  const groupsHtml = groups.map((grp, gi) => {
    const grpDrugs = filtered.filter(d => d.groupName === grp);
    const gid = `grp-${cat}-${gi}`;
    return `<div class="group-section">
      <div class="class-group-header">
        <span class="class-label">${grp}</span>
        <button class="group-expand-btn" onclick="toggleGroup('${gid}',this)">▼ Expand</button>
      </div>
      <div class="cards-grid" id="${gid}">
        ${grpDrugs.map(d => renderCard(d)).join('')}
      </div>
    </div>`;
  }).join('');

  container.innerHTML = `<div class="ref-panel" id="panel-${cat}">${introHtml}${groupsHtml}</div>`;
}

function renderCard(d) {
  const q = searchQ;
  const sections = [
    { label: 'Mechanism',         cls: 'lbl-moa', val: d.moa },
    { label: 'Clinical Use',      cls: 'lbl-use', val: d.use },
    { label: 'Side Effects',      cls: 'lbl-se',  val: d.se  },
    { label: 'Contraindications', cls: 'lbl-ci',  val: d.ci  },
    { label: 'Pharmacokinetics',  cls: 'lbl-pk',  val: d.pk  },
  ].filter(s => s.val);

  const akaHtml = d.aka
    ? d.aka.replace(/·/g, '<span class="dot-sep">·</span>')
    : '';

  return `<div class="rcard" data-cat="${d.category}"
    tabindex="0" role="button" aria-label="${esc(d.name)}" aria-expanded="false"
    onclick="toggleCard(this)">
    <div class="rcard-header">
      <div class="rcard-header-left">
        <div class="rcard-name">${fmt(d.name, q)}</div>
        ${akaHtml ? `<div class="rcard-aka">${akaHtml}</div>` : ''}
      </div>
      <button class="rcard-toggle" tabindex="-1" aria-hidden="true">▼</button>
    </div>
    <div class="rcard-summary">${fmt(d.summary, q)}</div>
    <div class="rcard-detail">
      ${sections.map(s => `
        <div class="rcard-field">
          <span class="rcard-field-label ${s.cls}">${s.label}</span>
          <div class="rcard-field-text">${fmtLines(s.val, q)}</div>
        </div>`).join('')}
      ${d.pearl ? `
        <div class="rcard-pearl">
          <span class="pearl-diamond">◆</span>
          <div class="pearl-body">
            <div class="pearl-text"><span class="pearl-label">Step 1 Pearl:</span> ${fmt(d.pearl, q)}</div>
          </div>
        </div>` : ''}
    </div>
  </div>`;
}

function toggleCard(el) {
  if (window.getSelection().toString().length > 0) return;
  const expanding = !el.classList.contains('expanded');
  el.classList.toggle('expanded', expanding);
  el.setAttribute('aria-expanded', String(expanding));
}

function toggleGroup(gid, btn) {
  const cards = document.querySelectorAll(`#${gid} .rcard`);
  const anyOpen = [...cards].some(c => c.classList.contains('expanded'));
  cards.forEach(c => {
    c.classList.toggle('expanded', !anyOpen);
    c.setAttribute('aria-expanded', String(!anyOpen));
  });
  btn.textContent = anyOpen ? '▼ Expand' : '▲ Collapse';
}

function switchTab(cat) {
  activeTab = cat;
  searchQ = '';
  document.getElementById('drug-search').value = '';
  document.querySelectorAll('.group-expand-btn').forEach(b => b.textContent = '▼ Expand');
  render();
}

function onSearch() {
  searchQ = document.getElementById('drug-search').value.toLowerCase().trim();
  render();
}

document.addEventListener('keydown', e => {
  const search = document.getElementById('drug-search');
  if (e.key === '/' && document.activeElement !== search) {
    e.preventDefault(); search.focus(); search.select();
  }
  if ((e.key === 'Enter' || e.key === ' ') && e.target.classList.contains('rcard')) {
    e.preventDefault(); toggleCard(e.target);
  }
  if (e.key === 'Escape') {
    if (searchQ) { search.value = ''; onSearch(); }
    else {
      const open = document.querySelector('.rcard.expanded');
      if (open) toggleCard(open);
    }
  }
});

window.addEventListener('appAuthStateChanged', () => { if (allDrugs.length) render(); });
document.addEventListener('DOMContentLoaded', () => {
  allDrugs = buildDrugList();
  activeTab = 'autonomic';
  render();
});
</script>
</body>
</html>
