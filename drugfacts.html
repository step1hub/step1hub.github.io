<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="style.css"/>
<title>Drug Facts · Step 1 Hub</title>
<style>
/* ═══════ SHARED REFERENCE PAGE STYLES ═══════════════════ */

/* ── Page header ─────────────────────────────────────────── */
.ref-page-header {
  padding: 40px 0 0;
  display: flex; align-items: flex-end; justify-content: space-between;
  gap: 20px; flex-wrap: wrap;
}
.ref-page-left {}
/* page-eyebrow and page-title are defined in style.css; 
   ref-page-eyebrow/title are kept as aliases for compatibility */
.ref-page-eyebrow { font-size: 10px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: var(--accent); opacity: .8; margin-bottom: 10px; }
.ref-page-title { font-family: 'Playfair Display', serif; font-size: clamp(28px, 3.8vw, 44px); font-weight: 700; line-height: 1.1; letter-spacing: -0.4px; color: var(--ink); margin-bottom: 6px; }
.ref-page-title em { font-style: italic; color: var(--accent); }
.ref-count {
  font-size: 12px; color: var(--muted);
  align-self: flex-end; padding-bottom: 6px;
  white-space: nowrap;
}
.ref-count strong { color: var(--ink2); font-weight: 600; }

/* ── Search bar ──────────────────────────────────────────── */
.ref-search-row {
  display: flex; align-items: center; gap: 10px;
  padding: 16px 0 0;
}
.ref-search-wrap {
  flex: 1; position: relative; max-width: 540px;
}
.ref-search-icon {
  position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
  font-size: 14px; color: var(--dim); pointer-events: none;
}
.ref-search-input {
  width: 100%; padding: 10px 14px 10px 38px;
  border: 1.5px solid var(--border); border-radius: 99px;
  background: var(--surface); font-size: 13.5px; color: var(--ink);
  font-family: 'DM Sans', sans-serif;
  outline: none; transition: border-color .15s, box-shadow .15s;
}
.ref-search-input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}
.ref-search-input::placeholder { color: var(--dim); }

/* ── Category tabs — pill style ──────────────────────────── */
.cat-tab-bar {
  display: flex; gap: 4px; flex-wrap: wrap;
  margin-top: 20px; padding-bottom: 0;
  border-bottom: 1px solid var(--border2);
  padding-bottom: 12px;
}
.cat-tab {
  padding: 6px 14px;
  font-size: 11.5px; font-weight: 600; color: var(--muted);
  border-radius: 99px;
  border: 1.5px solid transparent;
  cursor: pointer; white-space: nowrap;
  background: transparent;
  font-family: 'DM Sans', sans-serif;
  transition: color .15s, background .15s, border-color .15s;
  letter-spacing: 0.2px;
}
.cat-tab:hover { color: var(--ink2); background: var(--surface2); }
.cat-tab.active {
  color: var(--accent);
  background: var(--accent-light);
  border-color: color-mix(in srgb, var(--accent) 30%, transparent);
}

/* ── Content panel ───────────────────────────────────────── */
.ref-panel { padding-top: 4px; }
.ref-panel.hidden { display: none; }

/* ── Group section header ────────────────────────────────── */
.group-header {
  display: flex; align-items: center; gap: 12px;
  margin: 28px 0 14px;
}
.group-header:first-child { margin-top: 20px; }
.group-title {
  font-size: 11px; font-weight: 700; letter-spacing: 1.8px;
  text-transform: uppercase; color: var(--muted);
  white-space: nowrap;
}
.group-line { flex: 1; height: 1px; background: var(--border2); }
.group-badge { font-size: 10px; font-weight: 600; color: var(--dim); white-space: nowrap; }

/* ── Card grid ───────────────────────────────────────────── */
.cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 10px;
  margin-bottom: 4px;
}

/* ── Ref card ────────────────────────────────────────────── */
.rcard {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px 18px;
  cursor: pointer;
  transition: transform .16s ease, box-shadow .16s ease, border-color .16s ease;
  position: relative;
  display: flex; flex-direction: column; gap: 5px;
  overflow: hidden;
}
.rcard::before {
  content: '';
  position: absolute; left: 0; top: 0; bottom: 0;
  width: 3px; border-radius: 12px 0 0 12px;
  background: var(--accent);
  opacity: 0; transition: opacity .16s;
}
.rcard:hover {
  transform: translateY(-2px);
  box-shadow: 0 4px 20px rgba(42,31,26,.10), 0 1px 4px rgba(42,31,26,.06);
  border-color: color-mix(in srgb, var(--accent) 30%, var(--border));
}
.rcard:hover::before { opacity: 1; }
.rcard:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

.rcard-name {
  font-family: 'Playfair Display', serif;
  font-size: 15px; font-weight: 600; line-height: 1.3; color: var(--ink);
}
.rcard-aka {
  font-size: 11.5px; color: var(--muted); font-style: italic; line-height: 1.4;
}
.rcard-summary {
  font-size: 12.5px; color: var(--ink2); line-height: 1.55; margin-top: 2px;
}

/* ── Empty state ─────────────────────────────────────────── */
.ref-empty { grid-column: 1 / -1; padding: 56px 24px; text-align: center; }
.ref-empty-title {
  font-family: 'Playfair Display', serif;
  font-size: 18px; font-weight: 600; color: var(--ink2); margin-bottom: 6px;
}
.ref-empty-sub { font-size: 13px; color: var(--muted); }

/* ── Detail modal content ────────────────────────────────── */
.modal-group-label {
  font-size: 10px; font-weight: 700; letter-spacing: 1.5px;
  text-transform: uppercase; margin-bottom: 4px;
}
.modal-name {
  font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700;
  line-height: 1.2; margin-bottom: 3px;
}
.modal-sub-line {
  font-size: 12.5px; color: var(--muted); font-style: italic;
  margin-bottom: 0; line-height: 1.5;
}

/* ── Drug section rows — each as a distinct block ────────── */
#ddm-content {
  display: flex; flex-direction: column; gap: 0;
  margin-top: 18px;
}
#ddm-content .drug-row {
  padding: 12px 14px;
  border-radius: 10px;
  background: var(--bg);
  border: 1px solid var(--border2);
  margin-bottom: 6px;
}
#ddm-content .drug-label {
  display: block;
  font-size: 9px; font-weight: 700; letter-spacing: 2px;
  text-transform: uppercase; color: var(--accent);
  margin-bottom: 5px; opacity: .85;
}
#ddm-content .drug-text {
  font-size: 13.5px; color: var(--ink2); line-height: 1.65;
}
#ddm-content .drug-text strong { color: var(--ink); font-weight: 600; }

/* Pearl box — standout accent block */
#ddm-content .pearl-box {
  background: var(--accent-light);
  border: 1px solid color-mix(in srgb, var(--accent) 25%, transparent);
  border-radius: 10px;
  padding: 12px 14px;
  margin-top: 2px; margin-bottom: 6px;
}
#ddm-content .pearl-box .drug-label {
  color: var(--accent); opacity: 1;
}

/* Header divider below aka */
.modal-header-divider {
  height: 1px; background: var(--border2); margin: 14px 0 0;
}
/* ── Drug-specific accent ────────────────────────────────── */
:root {
  --accent: var(--sakura2);
  --accent-light: var(--sakura-light);
  --accent-glow: rgba(196,80,94,.12);
}

/* ── Tabs: all 10 fit on one line at desktop ─────────────── */
@media (min-width: 900px) {
  .cat-tab-bar { flex-wrap: nowrap; }
  .cat-tab { padding: 6px 11px; font-size: 11px; }
}
@media (min-width: 1100px) {
  .cat-tab { padding: 6px 13px; font-size: 11.5px; }
}
</style>
</head>
<body>

<div class="petals" aria-hidden="true">
  <div class="petal"></div><div class="petal"></div><div class="petal"></div>
  <div class="petal"></div><div class="petal"></div><div class="petal"></div>
  <div class="petal"></div><div class="petal"></div><div class="petal"></div>
  <div class="petal"></div>
</div>

<script src="nav.js"></script>

<div class="wrap">

  <!-- ── Header ──────────────────────────────────────────── -->
  <div class="ref-page-header">
    <div class="ref-page-left">
      <div class="ref-page-eyebrow">Pharmacology Reference</div>
      <h1 class="ref-page-title">Drug <em>Facts</em></h1>
    </div>
    <div class="ref-count" id="results-meta"></div>
  </div>

  <!-- ── Search ──────────────────────────────────────────── -->
  <div class="ref-search-row">
    <div class="ref-search-wrap">
      <span class="ref-search-icon">🔍</span>
      <input class="ref-search-input" type="text" id="drug-search"
             placeholder="Drug name, mechanism, side effects, tags…"
             oninput="onSearch()" autocomplete="off"/>
    </div>
  </div>

  <!-- ── Category tabs ───────────────────────────────────── -->
  <div class="cat-tab-bar" id="cat-tabs" role="tablist"></div>

  <!-- ── Panels rendered here ────────────────────────────── -->
  <div id="panels-container"></div>

</div><!-- /wrap -->

<!-- ── Detail Modal ──────────────────────────────────────── -->
<div class="modal-overlay" id="drug-detail-modal" role="dialog" aria-modal="true" aria-labelledby="ddm-name">
  <div class="modal detail-modal">
    <div class="modal-header">
      <div style="flex:1;min-width:0;">
        <div class="modal-group-label" id="ddm-system" style="color:var(--accent);"></div>
        <div class="modal-name" id="ddm-name"></div>
        <div class="modal-sub-line" id="ddm-aka"></div>
      </div>
      <button class="modal-close-btn" onclick="closeModal('drug-detail-modal')" aria-label="Close">&times;</button>
    </div>
    <div class="modal-header-divider"></div>
    <div id="ddm-content" style="max-height:62vh;overflow-y:auto;padding-right:4px;"></div>
    <div class="modal-btns" style="margin-top:20px;padding-top:16px;border-top:1px solid var(--border);">
      <button class="btn-cancel" onclick="closeModal('drug-detail-modal')">Close</button>
    </div>
  </div>
</div>

<script src="drug_data.js"></script>
<script src="app.js"></script>
<script>
/* ── Config ─────────────────────────────────────────────── */
const CAT_META = {
  autonomic:   { label: 'Autonomic',       icon: '⚡' },
  cv:          { label: 'Cardiovascular',  icon: '❤️' },
  blood:       { label: 'Blood',           icon: '🩸' },
  neuro:       { label: 'Neuro / Psych',   icon: '🧠' },
  micro:       { label: 'Antimicrobials',  icon: '🦠' },
  gi:          { label: 'GI',              icon: '🫁' },
  endo:        { label: 'Endocrine',       icon: '🔬' },
  pulm:        { label: 'Pulmonary',       icon: '🫀' },
  onco:        { label: 'Oncology',        icon: '⚗️' },
  toxicology:  { label: 'Toxicology',      icon: '☠️' },
};

let allDrugs = [];
let activeTab = '';
let searchQ = '';

/* ── Build flat drug list ────────────────────────────────── */
function buildDrugList() {
  const list = [];
  Object.entries(DRUGS).forEach(([cat, groups]) =>
    groups.forEach(grp =>
      grp.drugs.forEach(d => list.push({ ...d, category: cat, groupName: grp.group }))
    )
  );
  return list;
}

/* ── Filtering ───────────────────────────────────────────── */
function getFiltered() {
  return allDrugs.filter(d => {
    if (activeTab && d.category !== activeTab) return false;
    if (searchQ) {
      const blob = [d.name, d.aka, d.summary, d.moa, d.use, d.se,
                    (d.tags || []).join(' ')].join(' ').toLowerCase();
      if (!blob.includes(searchQ)) return false;
    }
    return true;
  });
}

/* ── Render everything ───────────────────────────────────── */
function render() {
  const filtered = getFiltered();

  // Update count
  const meta = document.getElementById('results-meta');
  meta.innerHTML = filtered.length === allDrugs.length
    ? `<strong>${allDrugs.length}</strong> drugs`
    : `<strong>${filtered.length}</strong> of ${allDrugs.length} drugs`;

  // Rebuild tabs with live counts
  renderTabs(filtered);

  // Render panels
  renderPanels(filtered);
}

function renderTabs(filtered) {
  const tabBar = document.getElementById('cat-tabs');
  const cats = Object.keys(CAT_META);

  // "All" tab — only show when searching
  const showAll = !!searchQ;

  let html = '';
  if (showAll) {
    html += `<button class="cat-tab${activeTab === '' ? ' active' : ''}"
               onclick="switchTab('')" role="tab" aria-selected="${activeTab===''}"
               data-cat="">All</button>`;
  }

  cats.forEach(cat => {
    const catFiltered = filtered.filter(d => d.category === cat);
    if (catFiltered.length === 0 && searchQ) return; // hide empty cats when searching
    const meta = CAT_META[cat];
    const isActive = activeTab === cat;
    html += `<button class="cat-tab${isActive ? ' active' : ''}"
               onclick="switchTab('${cat}')" role="tab" aria-selected="${isActive}"
               data-cat="${cat}">${meta.label}</button>`;
  });

  tabBar.innerHTML = html;

  // Auto-select first visible tab if current is gone
  if (!showAll && activeTab === '') {
    const firstCat = cats.find(c => filtered.some(d => d.category === c));
    if (firstCat) switchTab(firstCat, false);
  }
}

function renderPanels(filtered) {
  const container = document.getElementById('panels-container');
  const cats = activeTab ? [activeTab] : Object.keys(CAT_META);

  if (filtered.length === 0) {
    container.innerHTML = `
      <div class="cards-grid" style="margin-top:16px;">
        <div class="ref-empty">
          <div class="ref-empty-title">No results</div>
          <div class="ref-empty-sub">Try a different search term.</div>
        </div>
      </div>`;
    return;
  }

  container.innerHTML = cats.map(cat => {
    const catDrugs = filtered.filter(d => d.category === cat);
    if (!catDrugs.length) return '';
    const groups = [...new Set(catDrugs.map(d => d.groupName))];

    return `<div class="ref-panel" id="panel-${cat}">
      ${groups.map(grp => {
        const grpDrugs = catDrugs.filter(d => d.groupName === grp);
        return `
          <div class="group-header">
            <span class="group-title">${grp}</span>
            <div class="group-line"></div>
            <span class="group-badge">${grpDrugs.length}</span>
          </div>
          <div class="cards-grid">
            ${grpDrugs.map(d => renderCard(d)).join('')}
          </div>`;
      }).join('')}
    </div>`;
  }).join('');
}

function renderCard(d) {
  return `<div class="rcard"
               onclick='openDrugDetail(${JSON.stringify(d).replace(/'/g,"&#39;")})'
               tabindex="0" role="button" aria-label="${d.name}">
    <div class="rcard-name">${d.name}</div>
    ${d.aka ? `<div class="rcard-aka">${d.aka}</div>` : ''}
    <div class="rcard-summary">${d.summary || ''}</div>
  </div>`;
}

/* ── Tab switching ───────────────────────────────────────── */
function switchTab(cat, doRender = true) {
  activeTab = cat;
  if (doRender) render();
}

function onSearch() {
  searchQ = document.getElementById('drug-search').value.toLowerCase().trim();
  render();
}

/* ── Detail modal ────────────────────────────────────────── */
function openDrugDetail(d) {
  const fmt = t => t ? t.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>') : '';
  const catLabel = (CAT_META[d.category]?.label || d.category);

  document.getElementById('ddm-system').textContent =
    catLabel + (d.groupName ? ' · ' + d.groupName : '');
  document.getElementById('ddm-name').textContent = d.name;
  document.getElementById('ddm-aka').textContent = d.aka || '';

  const sections = [
    ['Mechanism',        d.moa],
    ['Clinical Use',     d.use],
    ['Side Effects',     d.se],
    ['Contraindications',d.ci],
    ['Pharmacokinetics', d.pk],
  ].filter(([, v]) => v);

  document.getElementById('ddm-content').innerHTML =
    sections.map(([label, val]) =>
      `<div class="drug-row">
         <span class="drug-label">${label}</span>
         <div class="drug-text">${fmt(val)}</div>
       </div>`
    ).join('') +
    (d.pearl ? `<div class="pearl-box">
       <span class="drug-label">Clinical Pearl</span>
       <div class="drug-text">${fmt(d.pearl)}</div>
     </div>` : '');

  openModal('drug-detail-modal');
}

/* ── Keyboard support ────────────────────────────────────── */
document.addEventListener('keydown', e => {
  if ((e.key === 'Enter' || e.key === ' ') && e.target.classList.contains('rcard')) {
    e.preventDefault();
    e.target.click();
  }
  if (e.key === 'Escape') closeModal('drug-detail-modal');
});

/* ── Init ────────────────────────────────────────────────── */
document.addEventListener('DOMContentLoaded', () => {
  allDrugs = buildDrugList();
  // Set default tab to first category
  activeTab = Object.keys(CAT_META)[0];
  render();
});
</script>
</body>
</html>
