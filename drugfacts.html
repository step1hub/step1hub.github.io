<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="style.css"/>
<title>Drug Facts · Step 1 Hub</title>
<style>
:root {
  --accent:       var(--sakura2);
  --accent-light: var(--sakura-light);
  --accent-glow:  rgba(196,80,94,.10);
}
</style>
</head>
<body>

<div class="petals" aria-hidden="true">
  <div class="petal"></div><div class="petal"></div><div class="petal"></div>
  <div class="petal"></div><div class="petal"></div><div class="petal"></div>
  <div class="petal"></div><div class="petal"></div><div class="petal"></div>
  <div class="petal"></div>
</div>

<script src="nav.js"></script>

<div class="wrap">

  <div class="ref-page-header">
    <div>
      <div class="ref-page-eyebrow">Pharmacology Reference</div>
      <h1 class="ref-page-title">Drug <em>Facts</em></h1>
      <p class="ref-page-sub">MOA · Uses · Side Effects · PK · Clinical Pearls</p>
    </div>
    <div class="ref-count" id="results-meta"></div>
  </div>

  <!-- Search row -->
  <div class="ref-search-row">
    <div class="ref-search-wrap">
      <span class="ref-search-icon">
        <svg class="ref-search-svg" viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="22" y2="22"/>
        </svg>
      </span>
      <input class="ref-search-input" type="text" id="drug-search"
             placeholder="Search drug, class, mechanism, side effect…"
             oninput="onSearch()" autocomplete="off"/>
      <button class="ref-search-clear" id="search-clear-btn" title="Clear search" onclick="clearSearch()">✕</button>
    </div>
    <button class="bookmark-filter-btn" id="bookmark-filter-btn" onclick="toggleBookmarkFilter()">
      ★ Bookmarked <span class="bk-count" id="bk-count">0</span>
    </button>
  </div>

  <!-- View mode bar -->
  <div class="view-mode-bar">
    <button class="mode-btn active" id="mode-browse" onclick="setMode('browse')">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
        <rect x="1" y="1" width="6" height="6" rx="1.5"/><rect x="9" y="1" width="6" height="6" rx="1.5"/>
        <rect x="1" y="9" width="6" height="6" rx="1.5"/><rect x="9" y="9" width="6" height="6" rx="1.5"/>
      </svg>
      Browse
    </button>
    <button class="mode-btn" id="mode-quiz" onclick="setMode('quiz')">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
        <rect x="1" y="2" width="14" height="12" rx="2"/>
        <line x1="5" y1="8" x2="11" y2="8"/><line x1="8" y1="5" x2="8" y2="11"/>
      </svg>
      Flashcard Quiz
    </button>
  </div>

  <!-- Quiz strip: progress + stat + settings toggle -->
  <div class="quiz-strip" id="quiz-strip">
    <div class="quiz-progress-bar-wrap">
      <div class="quiz-progress-bar-fill" id="quiz-progress-fill" style="width:0%"></div>
    </div>
    <div class="quiz-strip-row">
      <span class="quiz-stat" id="quiz-stat"></span>
      <span class="quiz-kbd-hint">Space=flip · 1=Again · 2=Hard · 3=Got it</span>
      <button class="quiz-settings-btn" id="quiz-settings-btn" onclick="toggleQuizSidebar()" title="Settings">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
          <circle cx="8" cy="8" r="2.2"/>
          <path d="M8 1.5v1.8M8 12.7v1.8M1.5 8h1.8M12.7 8h1.8M3.4 3.4l1.27 1.27M11.33 11.33l1.27 1.27M3.4 12.6l1.27-1.27M11.33 4.67l1.27-1.27"/>
        </svg>
        Settings
      </button>
    </div>
  </div>

  <!-- Tab bar -->
  <div class="cat-tab-bar" id="cat-tabs" role="tablist"></div>

  <!-- Browse panels -->
  <div id="panels-container"></div>

  <!-- Quiz layout: sidebar + card area -->
  <div class="quiz-layout" id="quiz-layout" style="display:none;">

    <!-- Settings sidebar -->
    <aside class="quiz-sidebar" id="quiz-sidebar">

      <div class="qsb-section">
        <div class="qsb-label">Direction</div>
        <div class="qsb-pill-group">
          <button class="qsb-pill active" id="dir-name" onclick="setQuizDir('name-to-facts')">Drug → Facts</button>
          <button class="qsb-pill" id="dir-guess" onclick="setQuizDir('facts-to-name')">Facts → Drug</button>
        </div>
      </div>

      <div class="qsb-section">
        <div class="qsb-label">Scope</div>
        <div class="qsb-scope-group">
          <button class="qsb-scope-btn active" data-scope="current" onclick="setQuizScope('current')">Current tab</button>
          <button class="qsb-scope-btn" data-scope="all" onclick="setQuizScope('all')">All drugs</button>
          <button class="qsb-scope-btn" data-scope="custom" onclick="setQuizScope('custom')">Choose categories…</button>
        </div>
        <div class="quiz-cat-picker" id="quiz-cat-picker" style="display:none;margin-top:8px;"></div>
      </div>

      <div class="qsb-section" style="padding-bottom:14px;">
        <div class="qsb-label">Show on back</div>
        <div class="qsb-checks">
          <label class="qsb-check"><input type="checkbox" checked value="moa" onchange="toggleFieldVis('moa',this)"><span>Mechanism</span></label>
          <label class="qsb-check"><input type="checkbox" checked value="use" onchange="toggleFieldVis('use',this)"><span>Clinical Use</span></label>
          <label class="qsb-check"><input type="checkbox" checked value="se"  onchange="toggleFieldVis('se',this)"><span>Side Effects</span></label>
          <label class="qsb-check"><input type="checkbox" checked value="ci"  onchange="toggleFieldVis('ci',this)"><span>Contraindications</span></label>
          <label class="qsb-check"><input type="checkbox" checked value="pk"  onchange="toggleFieldVis('pk',this)"><span>Pharmacokinetics</span></label>
        </div>
      </div>

      <div class="qsb-divider"></div>

      <div class="qsb-actions">
        <button class="qsb-action-btn" onclick="shuffleQuiz()">
          <svg width="11" height="11" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M1 4h2.5a4 4 0 013.2 1.6L8 7M15 4h-2.5a4 4 0 00-3.2 1.6L8 7m0 0l1.3 1.7A4 4 0 0012.5 10H15M1 12h2.5a4 4 0 003.2-1.6L8 9"/><path d="M13 2l2 2-2 2M13 8l2 2-2 2"/></svg>
          Shuffle
        </button>
        <button class="qsb-action-btn" onclick="resetQuiz()">
          <svg width="11" height="11" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M2 8a6 6 0 106-6H4m0 0L2 4m2-2v4"/></svg>
          Reset
        </button>
      </div>

    </aside>

    <!-- Card area -->
    <div class="quiz-main" id="quiz-container"></div>

  </div>

</div>

<!-- Drug detail modal -->
<div class="drug-modal-overlay" id="drug-modal-overlay" onclick="handleModalOverlayClick(event)">
  <div class="drug-modal" id="drug-modal">

    <div class="drug-modal-topbar" id="modal-banner">
      <div class="drug-modal-breadcrumb" id="modal-breadcrumb"></div>
      <div class="drug-modal-topbar-right">
        <button id="modal-star-btn" class="rcard-star" style="font-size:16px;padding:4px 8px;" onclick="toggleModalBookmark()" title="Bookmark (S)">☆</button>
        <span class="drug-modal-counter" id="modal-counter"></span>
        <button class="drug-modal-nav-btn" id="modal-prev" onclick="modalNav(-1)" title="Previous">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M8 2L4 6l4 4"/></svg>
          Prev
        </button>
        <button class="drug-modal-nav-btn" id="modal-next" onclick="modalNav(1)" title="Next">
          Next
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 2l4 4-4 4"/></svg>
        </button>
        <button class="drug-modal-close" onclick="closeModal()" title="Close (Esc)">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M2 2l10 10M12 2L2 12"/></svg>
        </button>
      </div>
    </div>

    <div class="drug-modal-header" id="modal-header">
      <div class="drug-modal-title" id="modal-title"></div>
      <div class="drug-modal-aka" id="modal-aka"></div>
    </div>

    <div class="drug-modal-summary" id="modal-summary"></div>
    <div class="drug-modal-body" id="modal-body"></div>

  </div>
</div>

<script src="drug_data.js"></script>
<script src="app.js"></script>
<script>
/* ============================================================
   DRUG FACTS PAGE LOGIC
   ============================================================ */

const CAT_META = {
  autonomic:  { label: 'Autonomics',     color: '#c4505e', desc: 'Parasympathetic (cholinergic) and sympathetic (adrenergic) drug classes. Master receptor subtypes first — M1/M2/M3, α1/α2, β1/β2 — and the drugs fall into place. High-yield for organ-specific side effects and clinical applications.' },
  cv:         { label: 'Cardio & Renal', color: '#9e3a5a', desc: 'The most tested drug system on Step 1. Know ACEi/ARBs cold — they appear in HF, HTN, CKD, and post-MI vignettes. Antiarrhythmic classes: think ion channels first, then drugs. Diuretic electrolyte effects are guaranteed questions.' },
  blood:      { label: 'Hematology',     color: '#7a3a8a', desc: 'Anticoagulants appear on nearly every Step 1 exam — know reversal agents cold. Heparin-induced thrombocytopenia (HIT) is a classic trap. NSAIDs are the most-prescribed drugs in medicine; their mechanism and GI/renal toxicity are ubiquitous.' },
  neuro:      { label: 'Neuro & Psych',  color: '#5a4490', desc: 'Psych block is massive on Step 1. Memorize antidepressant side effect profiles — TCA overdose, SSRI serotonin syndrome, and bupropion seizures appear constantly. Antipsychotic EPS and NMS are classic vignettes. Lithium toxicity has a narrow therapeutic window.' },
  micro:      { label: 'Microbiology',   color: '#3a6e7a', desc: 'Organized by mechanism: cell wall inhibitors → protein synthesis → DNA/folate → cell membrane. For each drug know its unique toxicity, not just its coverage. Antibiotic-associated C. diff (clindamycin, fluoroquinolones, cephalosporins) is a perennial vignette.' },
  gi:         { label: 'GI & Motility',  color: '#9e6a3d', desc: 'Focus on acid suppression, motility agents, and mucosal protection. High-yield for C. difficile associations and metabolic interactions with PPIs.' },
  endo:       { label: 'Endo & Repro',   color: '#c08c3e', desc: 'Master the hypothalamic-pituitary axes, diabetes management, and reproductive hormones. High-yield for Step 1 feedback loops and drug-induced endocrine disorders.' },
  pulm:       { label: 'Pulmonary',      color: '#3d6e8a', desc: 'Asthma step therapy is heavily tested — know which drugs are for acute relief vs. maintenance. Antihistamine receptor subtypes (H1 vs H2) determine organ effects and drug indication.' },
  onco:       { label: 'Oncology',       color: '#3a5a6e', desc: 'Step 1 tests toxicities more than mechanisms. Every chemotherapy drug has one unique, memorable toxicity — bleomycin → pulmonary fibrosis, cisplatin → nephrotoxicity/ototoxicity, vincristine → peripheral neuropathy (not bone marrow suppression).' },
  toxicology: { label: 'Toxicology',     color: '#a63e3e', desc: 'Crucial reversal agents and toxidromes. Focus on the mechanism of toxicity and the logic of the chosen antidote. Know the classic overdose presentations cold.' },
};

// ── State ──────────────────────────────────────────────────
let allDrugs = [];
let activeTab = 'autonomic';
let searchQ = '';
let currentMode = 'browse';
let quizDir = 'name-to-facts';
let quizScope = 'current';       // 'current' | 'all' | 'custom'
let quizCustomCats = new Set();  // active when quizScope === 'custom'
let quizDrugs = [];
let quizIdx = 0;
let quizResults = { again: 0, hard: 0, good: 0 };
let bookmarkFilter = false;
let bookmarks = new Set();
// which back-of-card fields are visible; pearl is always shown if present
let quizVisibleFields = new Set(['moa','use','se','ci','pk']);

// ── Bookmarks ──────────────────────────────────────────────
function loadBookmarks() {
  try {
    const saved = localStorage.getItem('df-bookmarks');
    bookmarks = saved ? new Set(JSON.parse(saved)) : new Set();
  } catch { bookmarks = new Set(); }
}
function saveBookmarks() {
  localStorage.setItem('df-bookmarks', JSON.stringify([...bookmarks]));
  syncBookmarkCount();
}
function syncBookmarkCount() {
  const cnt = document.getElementById('bk-count');
  const btn = document.getElementById('bookmark-filter-btn');
  if (cnt) cnt.textContent = bookmarks.size;
  if (btn) btn.classList.toggle('active', bookmarkFilter);
}
function toggleBookmark(name) {
  if (bookmarks.has(name)) bookmarks.delete(name);
  else bookmarks.add(name);
  saveBookmarks();
}
function toggleBookmarkFilter() {
  bookmarkFilter = !bookmarkFilter;
  document.getElementById('bookmark-filter-btn').classList.toggle('active', bookmarkFilter);
  render();
}
function toggleModalBookmark() {
  const d = modalDrugs[modalIdx];
  if (!d) return;
  toggleBookmark(d.name);
  updateModalStarBtn(d.name);
  refreshCardStar(d.name);
}
function updateModalStarBtn(name) {
  const btn = document.getElementById('modal-star-btn');
  if (!btn) return;
  const starred = bookmarks.has(name);
  btn.textContent = starred ? '★' : '☆';
  btn.classList.toggle('starred', starred);
  btn.title = starred ? 'Remove bookmark (S)' : 'Bookmark (S)';
}
function refreshCardStar(name) {
  document.querySelectorAll('.rcard').forEach(c => {
    if (c.dataset.drugName === name) {
      const star = c.querySelector('.rcard-star');
      if (star) {
        const s = bookmarks.has(name);
        star.textContent = s ? '★' : '☆';
        star.classList.toggle('starred', s);
      }
    }
  });
}

// ── Build drug list ────────────────────────────────────────
function buildDrugList() {
  const list = [];
  Object.entries(DRUGS).forEach(([cat, groups]) =>
    groups.forEach(grp =>
      grp.drugs.forEach(d => list.push({ ...d, category: cat, groupName: grp.group }))
    )
  );
  return list;
}

function getFiltered() {
  let drugs = allDrugs;
  if (bookmarkFilter) drugs = drugs.filter(d => bookmarks.has(d.name));
  if (searchQ) {
    return drugs.filter(d => {
      const blob = [d.name, d.aka, d.summary, d.moa, d.use, d.se, d.ci, d.pk, d.pearl]
        .filter(Boolean).join(' ').toLowerCase();
      return blob.includes(searchQ);
    });
  }
  if (bookmarkFilter) return drugs;
  return drugs.filter(d => d.category === activeTab);
}

// ── Text helpers ───────────────────────────────────────────
function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmt(text, q) {
  if (!text) return '';
  let out = esc(text);
  out = out.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
  if (q) {
    const sq = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    out = out.replace(new RegExp(`(${sq})(?![^<]*>)`, 'gi'), '<mark class="search-hl">$1</mark>');
  }
  return out;
}
function fmtLines(text, q) {
  if (!text) return '';
  const parts = text.split('\n').map(s => s.trim()).filter(Boolean);
  if (parts.length <= 1) return `<div class="info-line">${fmt(text, q)}</div>`;
  return parts.map(p => `<div class="info-line">${fmt(p, q)}</div>`).join('');
}
function stripMd(text) {
  return (text||'').replace(/\*\*(.*?)\*\*/g, '$1');
}

// ── Mode switching ─────────────────────────────────────────
function setMode(mode) {
  currentMode = mode;
  document.getElementById('mode-browse').classList.toggle('active', mode === 'browse');
  document.getElementById('mode-quiz').classList.toggle('active', mode === 'quiz');
  const isQuiz = mode === 'quiz';
  document.getElementById('quiz-strip').style.display   = isQuiz ? '' : 'none';
  document.getElementById('quiz-layout').style.display  = isQuiz ? '' : 'none';
  document.getElementById('panels-container').style.display = isQuiz ? 'none' : '';
  document.getElementById('cat-tabs').style.display     = isQuiz ? 'none' : '';
  if (isQuiz) {
    // Open settings sidebar by default on first entry
    const sidebar = document.getElementById('quiz-sidebar');
    const btn = document.getElementById('quiz-settings-btn');
    if (sidebar && !sidebar.classList.contains('open')) {
      sidebar.classList.add('open');
      if (btn) btn.classList.add('active');
    }
    startQuiz();
  }
}

// ── Main render ────────────────────────────────────────────
function render() {
  const filtered = getFiltered();
  const isSearch = searchQ.length > 0;
  const isBmFilter = bookmarkFilter;

  document.getElementById('results-meta').innerHTML = (isSearch || isBmFilter)
    ? `<strong>${filtered.length}</strong> of ${allDrugs.length} drugs`
    : `<strong>${allDrugs.length}</strong> drugs`;

  document.getElementById('search-clear-btn').classList.toggle('visible', searchQ.length > 0);
  syncBookmarkCount();
  renderTabs();
  if (currentMode === 'browse') renderPanels(filtered, isSearch || isBmFilter);
}

function renderTabs() {
  let html = '';
  Object.entries(CAT_META).forEach(([cat, meta]) => {
    const isActive = (activeTab === cat && !searchQ && !bookmarkFilter);
    html += `<button class="cat-tab${isActive ? ' active' : ''}"
      onclick="switchTab('${cat}')" role="tab">
      <span class="tab-dot" style="background:${meta.color}"></span>${meta.label}
    </button>`;
  });
  document.getElementById('cat-tabs').innerHTML = html;
}

function renderPanels(filtered, isSearch) {
  const container = document.getElementById('panels-container');

  if (isSearch) {
    if (!filtered.length) {
      container.innerHTML = `<div class="cards-grid" style="margin-top:16px;">
        <div class="ref-empty">
          <div class="ref-empty-title">No results</div>
          <div class="ref-empty-sub">Try a different search term.</div>
        </div></div>`;
      return;
    }
    const cats = Object.keys(CAT_META).filter(c => filtered.some(d => d.category === c));
    container.innerHTML = cats.map(cat => {
      const catDrugs = filtered.filter(d => d.category === cat);
      if (!catDrugs.length) return '';
      const meta = CAT_META[cat];
      return `<div class="ref-panel" id="panel-${cat}">
        <div class="search-cat-label" style="color:${meta.color}">${meta.label}</div>
        <div class="cards-grid">${catDrugs.map(d => renderCard(d, meta.color)).join('')}</div>
      </div>`;
    }).join('');
    return;
  }

  if (!filtered.length) {
    container.innerHTML = `<div class="cards-grid" style="margin-top:16px;">
      <div class="ref-empty">
        <div class="ref-empty-title">${bookmarkFilter ? 'No bookmarks yet' : 'Nothing here yet'}</div>
        <div class="ref-empty-sub">${bookmarkFilter ? 'Click ☆ on any drug card to save it here.' : 'This category has no entries.'}</div>
      </div></div>`;
    return;
  }

  const cat = activeTab;
  const meta = CAT_META[cat];
  const groups = [...new Set(filtered.map(d => d.groupName))];

  const introHtml = `
    <div class="cat-intro" style="--cat-color:${meta.color}">
      <div class="cat-intro-title" style="color:${meta.color}">${meta.label}</div>
      <div class="cat-intro-desc">${meta.desc}</div>
    </div>`;

  const groupsHtml = groups.map((grp, gi) => {
    const grpDrugs = filtered.filter(d => d.groupName === grp);
    const gid = `grp-${cat}-${gi}`;
    return `<div class="group-section">
      <div class="class-group-header">
        <span class="class-label" style="color:${meta.color};border-color:${meta.color}40;background:${meta.color}12;">
          <span style="font-size:7px;">◆</span> ${grp}
        </span>
        <button class="group-expand-btn" style="--cat-color:${meta.color}" onclick="toggleGroup('${gid}',this)">▲ Collapse</button>
      </div>
      <div class="cards-grid" id="${gid}" style="display:grid;">
        ${grpDrugs.map(d => renderCard(d, meta.color)).join('')}
      </div>
    </div>`;
  }).join('');

  container.innerHTML = `<div class="ref-panel" id="panel-${cat}">${introHtml}${groupsHtml}</div>`;
}

function renderCard(d, catColor) {
  const color = catColor || CAT_META[d.category]?.color || 'var(--accent)';
  const q = searchQ;
  const isStarred = bookmarks.has(d.name);
  const akaHtml = d.aka
    ? d.aka.replace(/\|/g,'·').replace(/·+/g,'·').split('·')
        .map(s => s.trim()).filter(Boolean)
        .map(s => `<span class="aka-token">${s}</span>`)
        .join('<span class="dot-sep">·</span>')
    : '';

  return `<div class="rcard" data-cat="${d.category}" data-drug-name="${esc(d.name)}"
    style="--cat-color:${color};border-left-color:${color}"
    tabindex="0" role="button" aria-label="${esc(d.name)}"
    onclick="openCardModal(this)" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();openCardModal(this);}">
    <div class="rcard-header">
      <div class="rcard-header-left">
        <div class="rcard-name">${fmt(d.name, q)}</div>
        ${akaHtml ? `<div class="rcard-aka">${akaHtml}</div>` : ''}
      </div>
      <button class="rcard-star${isStarred ? ' starred' : ''}" tabindex="0"
        aria-label="Bookmark ${esc(d.name)}"
        onclick="event.stopPropagation();toggleCardBookmark(this,'${esc(d.name)}')">${isStarred ? '★' : '☆'}</button>
    </div>
    <div class="rcard-summary">${fmt(d.summary, q)}</div>
  </div>`;
}

function toggleCardBookmark(btn, name) {
  // decode HTML entities that esc() may have added
  const decoded = name.replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&quot;/g,'"');
  toggleBookmark(decoded);
  const isStarred = bookmarks.has(decoded);
  btn.textContent = isStarred ? '★' : '☆';
  btn.classList.toggle('starred', isStarred);
  syncBookmarkCount();
  if (bookmarkFilter && !isStarred) render();
}

// ── Modal ──────────────────────────────────────────────────
let modalDrugs = [], modalIdx = 0;

function openCardModal(cardEl) {
  if (window.getSelection().toString().length > 0) return;
  const filtered = getFiltered();
  modalDrugs = filtered;
  const cat = cardEl.dataset.cat;
  const name = cardEl.dataset.drugName;
  const idx = modalDrugs.findIndex(d => d.category === cat && d.name === name);
  modalIdx = idx >= 0 ? idx : 0;
  showModal();
}

function showModal() {
  const d = modalDrugs[modalIdx];
  if (!d) return;
  const color = CAT_META[d.category]?.color || 'var(--accent)';
  const catLabel = CAT_META[d.category]?.label || d.category;
  const q = searchQ;

  document.getElementById('modal-breadcrumb').innerHTML = `
    <span class="drug-modal-banner-cat" style="color:${color};border-color:${color}50;background:${color}12;">${catLabel}</span>
    <span class="drug-modal-banner-sep">›</span>
    <span class="drug-modal-banner-grp">${d.groupName || ''}</span>
  `;
  document.getElementById('drug-modal').style.setProperty('--cat-color', color);
  document.getElementById('modal-banner').style.borderBottom = `1px solid ${color}20`;
  document.getElementById('modal-banner').style.borderTop = `3px solid ${color}`;
  document.getElementById('modal-header').style.borderTop = 'none';
  document.getElementById('modal-title').innerHTML = fmt(d.name, q);

  const akaHtml = d.aka
    ? d.aka.replace(/\|/g,'·').replace(/·+/g,'·').split('·')
        .map(s => s.trim()).filter(Boolean)
        .map(s => `<span class="aka-token">${s}</span>`)
        .join('<span class="dot-sep">·</span>')
    : '';
  const akaEl = document.getElementById('modal-aka');
  akaEl.innerHTML = akaHtml;
  akaEl.style.display = akaHtml ? '' : 'none';

  document.getElementById('modal-summary').innerHTML = fmt(d.summary, q);
  document.getElementById('modal-counter').textContent = `${modalIdx + 1} / ${modalDrugs.length}`;

  const sections = [
    { label: 'Mechanism',         cls: 'lbl-moa', val: d.moa },
    { label: 'Clinical Use',      cls: 'lbl-use', val: d.use },
    { label: 'Side Effects',      cls: 'lbl-se',  val: d.se  },
    { label: 'Contraindications', cls: 'lbl-ci',  val: d.ci  },
    { label: 'Pharmacokinetics',  cls: 'lbl-pk',  val: d.pk  },
  ].filter(s => s.val);

  document.getElementById('modal-body').innerHTML = `
    ${sections.map(s => `
      <div class="rcard-field">
        <span class="rcard-field-label ${s.cls}">${s.label}</span>
        <div class="rcard-field-text">${fmtLines(s.val, q)}</div>
      </div>`).join('')}
    ${d.pearl ? `
      <div class="rcard-pearl">
        <span class="pearl-diamond" style="color:${color}">◆</span>
        <div class="pearl-body">
          <div class="pearl-text"><span class="pearl-label" style="color:${color}">Step 1 Pearl:</span> ${fmt(d.pearl, q)}</div>
        </div>
      </div>` : ''}
  `;

  document.getElementById('modal-prev').disabled = modalIdx === 0;
  document.getElementById('modal-next').disabled = modalIdx === modalDrugs.length - 1;
  document.getElementById('modal-body').scrollTop = 0;
  document.getElementById('drug-modal-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
  updateModalStarBtn(d.name);
}

function closeModal() {
  document.getElementById('drug-modal-overlay').classList.remove('open');
  document.body.style.overflow = '';
}
function modalNav(dir) {
  const next = modalIdx + dir;
  if (next >= 0 && next < modalDrugs.length) { modalIdx = next; showModal(); }
}
function handleModalOverlayClick(e) {
  if (e.target === document.getElementById('drug-modal-overlay')) closeModal();
}

// ── Browse helpers ─────────────────────────────────────────
function toggleGroup(gid, btn) {
  const grid = document.getElementById(gid);
  const isHidden = grid.style.display === 'none';
  grid.style.display = isHidden ? 'grid' : 'none';
  btn.textContent = isHidden ? '▲ Collapse' : '▼ Expand';
}

function switchTab(cat) {
  activeTab = cat;
  searchQ = '';
  bookmarkFilter = false;
  document.getElementById('drug-search').value = '';
  document.getElementById('bookmark-filter-btn').classList.remove('active');
  render();
  if (currentMode === 'quiz') startQuiz();
}

function onSearch() {
  searchQ = document.getElementById('drug-search').value.toLowerCase().trim();
  render();
}

function clearSearch() {
  document.getElementById('drug-search').value = '';
  searchQ = '';
  render();
  document.getElementById('drug-search').focus();
}

// ── Quiz logic ─────────────────────────────────────────────
function setQuizDir(dir) {
  quizDir = dir;
  document.getElementById('dir-name').classList.toggle('active', dir === 'name-to-facts');
  document.getElementById('dir-guess').classList.toggle('active', dir === 'facts-to-name');
  startQuiz();
}

function getQuizDrugs() {
  if (quizScope === 'all') return [...allDrugs];
  if (quizScope === 'custom' && quizCustomCats.size > 0)
    return allDrugs.filter(d => quizCustomCats.has(d.category));
  // 'current' — respect search/bookmark filter, fall back to active tab
  return [...getFiltered()];
}

function startQuiz() {
  quizDrugs = getQuizDrugs();
  quizIdx = 0;
  quizResults = { again: 0, hard: 0, good: 0 };
  renderQuizCard();
  updateQuizProgress();
}

function setQuizScope(scope) {
  quizScope = scope;
  document.querySelectorAll('[data-scope]').forEach(b => {
    b.classList.toggle('active', b.dataset.scope === scope);
  });
  const picker = document.getElementById('quiz-cat-picker');
  if (picker) picker.style.display = scope === 'custom' ? 'flex' : 'none';
  startQuiz();
}

function toggleQuizSidebar() {
  const sidebar = document.getElementById('quiz-sidebar');
  const btn = document.getElementById('quiz-settings-btn');
  sidebar.classList.toggle('open');
  btn.classList.toggle('active', sidebar.classList.contains('open'));
}

function toggleFieldVis(field, checkbox) {
  if (checkbox.checked) quizVisibleFields.add(field);
  else quizVisibleFields.delete(field);
  // Re-render back face if currently showing
  const back = document.getElementById('fc-back');
  if (back && back.style.display !== 'none') renderBackFields();
}

function toggleQuizCat(cat, el) {
  if (quizCustomCats.has(cat)) {
    quizCustomCats.delete(cat);
    el.classList.remove('active');
  } else {
    quizCustomCats.add(cat);
    el.classList.add('active');
  }
  startQuiz();
}

function shuffleQuiz() {
  quizDrugs = getQuizDrugs();
  for (let i = quizDrugs.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [quizDrugs[i], quizDrugs[j]] = [quizDrugs[j], quizDrugs[i]];
  }
  quizIdx = 0;
  quizResults = { again: 0, hard: 0, good: 0 };
  renderQuizCard();
  updateQuizProgress();
}

function buildCatPicker() {
  const picker = document.getElementById('quiz-cat-picker');
  if (!picker) return;
  picker.innerHTML = Object.entries(CAT_META).map(([cat, meta]) =>
    `<button class="quiz-cat-chip" data-cat="${cat}" style="--chip-color:${meta.color}" onclick="toggleQuizCat('${cat}',this)">${meta.label}</button>`
  ).join('');
}

function resetQuiz() { startQuiz(); }

function updateQuizProgress() {
  const done = quizIdx;
  const total = quizDrugs.length;
  const pct = total ? (done / total) * 100 : 0;
  document.getElementById('quiz-progress-fill').style.width = pct + '%';
  const stat = document.getElementById('quiz-stat');
  if (stat) {
    stat.innerHTML = total
      ? `<strong>${done}</strong>/${total} &nbsp;·&nbsp; ✓ ${quizResults.good} &nbsp; ~ ${quizResults.hard} &nbsp; ✗ ${quizResults.again}`
      : quizScope === 'custom' && quizCustomCats.size === 0
        ? 'Pick a category ↑'
        : 'No drugs';
  }
}

function renderQuizCard() {
  const container = document.getElementById('quiz-container');

  if (!quizDrugs.length) {
    container.innerHTML = `<div class="quiz-complete visible">
      <div class="quiz-complete-icon">🌸</div>
      <div class="quiz-complete-title">No drugs to quiz</div>
      <div class="quiz-complete-sub">${quizScope === 'custom' && quizCustomCats.size === 0 ? 'Select at least one category above.' : 'Adjust your tab, search, or bookmarks filter.'}</div>
    </div>`;
    return;
  }

  if (quizIdx >= quizDrugs.length) {
    const total = quizDrugs.length;
    const pct = total ? Math.round((quizResults.good / total) * 100) : 0;
    container.innerHTML = `<div class="quiz-complete visible">
      <div class="quiz-complete-icon">🎉</div>
      <div class="quiz-complete-title">Round Complete!</div>
      <div class="quiz-complete-sub">You reviewed all ${total} drug${total !== 1 ? 's' : ''}. <strong>${pct}%</strong> correct.</div>
      <div class="quiz-complete-stats">
        <div class="qc-stat"><div class="qc-stat-num" style="color:var(--sage)">${quizResults.good}</div><div class="qc-stat-lbl">✓ Got it</div></div>
        <div class="qc-stat"><div class="qc-stat-num" style="color:var(--gold)">${quizResults.hard}</div><div class="qc-stat-lbl">~ Hard</div></div>
        <div class="qc-stat"><div class="qc-stat-num" style="color:var(--sakura2)">${quizResults.again}</div><div class="qc-stat-lbl">✗ Again</div></div>
      </div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center;">
        <button class="quiz-restart-btn" onclick="resetQuiz()">↺ Review Again</button>
        <button class="quiz-restart-btn quiz-restart-outline" onclick="shuffleQuiz()">⇄ New Shuffle</button>
      </div>
    </div>`;
    return;
  }

  const d = quizDrugs[quizIdx];
  const color = CAT_META[d.category]?.color || 'var(--sakura2)';
  const catLabel = CAT_META[d.category]?.label || d.category;
  const isNameToFacts = quizDir === 'name-to-facts';

  const frontQ  = isNameToFacts ? d.name : stripMd(d.summary || d.moa || '').substring(0, 180) + (stripMd(d.summary||'').length > 180 ? '…' : '');
  const frontHint = isNameToFacts ? `${d.groupName ? d.groupName + ' · ' : ''}${catLabel}` : catLabel;

  const akaTokens = d.aka
    ? d.aka.replace(/\|/g,'·').replace(/·+/g,'·').split('·').map(s => s.trim()).filter(Boolean)
    : [];
  const akaHtml = akaTokens.length
    ? `<div class="fc-aka">${akaTokens.map(s=>`<span class="fc-aka-token">${s}</span>`).join('<span class="fc-aka-dot">·</span>')}</div>`
    : '';

  const mdFmt = v => v.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');

  const ALL_BACK_FIELDS = [
    isNameToFacts ? null : { key: 'sum', lbl: 'Summary',         val: d.summary },
    { key: 'moa', lbl: 'Mechanism',         val: d.moa },
    { key: 'use', lbl: 'Clinical Use',      val: d.use },
    { key: 'se',  lbl: 'Side Effects',      val: d.se  },
    { key: 'ci',  lbl: 'Contraindications', val: d.ci  },
    { key: 'pk',  lbl: 'Pharmacokinetics',  val: d.pk  },
    d.pearl ? { key: 'pearl', lbl: '★ Step 1 Pearl', val: d.pearl, isPearl: true } : null,
  ].filter(f => f && f.val);

  const visFields = ALL_BACK_FIELDS.filter(f => f.isPearl || f.key === 'sum' || quizVisibleFields.has(f.key));
  const isStarred = bookmarks.has(d.name);

  container.innerHTML = `
    <div class="quiz-single-wrap">
      <div class="quiz-nav-row">
        <button class="quiz-nav-btn" onclick="quizNavBack()" ${quizIdx === 0 ? 'disabled' : ''}>
          <svg width="11" height="11" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M8 2L4 6l4 4"/></svg>
          Prev
        </button>
        <div class="quiz-nav-center">
          <span class="quiz-card-counter">${quizIdx + 1} <span style="color:var(--dim)">/</span> ${quizDrugs.length}</span>
          <button class="fc-star-btn ${isStarred ? 'starred' : ''}"
            onclick="quizToggleStar(this,'${d.name.replace(/'/g,"&#39;")}')"
            title="Bookmark">${isStarred ? '★' : '☆'}</button>
        </div>
        <button class="quiz-nav-btn" onclick="rateCard('skip')">
          Skip
          <svg width="11" height="11" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M4 2l4 4-4 4"/></svg>
        </button>
      </div>

      <div class="fc-card fc-front" id="fc-front" style="--cat-color:${color}" onclick="flipCard()">
        <div class="fc-front-eyebrow" style="color:${color}">${isNameToFacts ? 'What do you know about this drug?' : 'Identify this drug'}</div>
        <div class="fc-front-q">${frontQ}</div>
        <div class="fc-front-hint">${frontHint}</div>
        <button class="fc-reveal-btn" style="--cat-color:${color}" onclick="event.stopPropagation();flipCard()">
          Reveal Answer <span style="opacity:0.6;margin-left:4px;">↩</span>
        </button>
      </div>

      <div class="fc-card fc-back" id="fc-back" style="--cat-color:${color};display:none;">
        <div class="fc-back-header">
          <div class="fc-back-eyebrow" style="color:${color}">${catLabel}${d.groupName ? ' · ' + d.groupName : ''}</div>
          <div class="fc-back-title">${isNameToFacts ? d.name : 'Answer'}</div>
          ${akaHtml}
        </div>
        <div class="fc-back-fields" id="fc-back-fields">
          ${buildFieldsHtml(visFields, color)}
        </div>
      </div>

      <div class="fc-rating-row" id="fc-actions" style="display:none;">
        <button class="fc-rate-btn fc-rate-again" onclick="rateCard('again')">
          <span class="fc-rate-key">1</span><span class="fc-rate-label">Again</span>
        </button>
        <button class="fc-rate-btn fc-rate-hard" onclick="rateCard('hard')">
          <span class="fc-rate-key">2</span><span class="fc-rate-label">Hard</span>
        </button>
        <button class="fc-rate-btn fc-rate-good" onclick="rateCard('good')">
          <span class="fc-rate-key">3</span><span class="fc-rate-label">Got it</span>
        </button>
      </div>
    </div>
  `;
}

function buildFieldsHtml(fields, color) {
  const mdFmt = v => v.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
  const regular = fields.filter(f => !f.isPearl);
  const pearl   = fields.find(f => f.isPearl);
  let html = '';
  if (regular.length) {
    html += `<div class="fc-fields-grid" style="--cat-color:${color}">
      ${regular.map(f => `<div class="fc-field">
        <div class="fc-field-lbl">${f.lbl}</div>
        <div class="fc-field-val">${mdFmt(f.val)}</div>
      </div>`).join('')}
    </div>`;
  }
  if (pearl) {
    html += `<div class="fc-field fc-field-pearl" style="--cat-color:${color}">
      <div class="fc-field-lbl">${pearl.lbl}</div>
      <div class="fc-field-val">${mdFmt(pearl.val)}</div>
    </div>`;
  }
  return html;
}

function renderBackFields() {
  const fieldsEl = document.getElementById('fc-back-fields');
  if (!fieldsEl) return;
  const idx = document.getElementById('fc-front') ? quizIdx : quizIdx - 1;
  const d = quizDrugs[quizIdx];
  if (!d) return;
  const color = CAT_META[d.category]?.color || 'var(--sakura2)';
  const isNameToFacts = quizDir === 'name-to-facts';
  const ALL = [
    isNameToFacts ? null : { key: 'sum', lbl: 'Summary', val: d.summary },
    { key: 'moa', lbl: 'Mechanism',         val: d.moa },
    { key: 'use', lbl: 'Clinical Use',      val: d.use },
    { key: 'se',  lbl: 'Side Effects',      val: d.se  },
    { key: 'ci',  lbl: 'Contraindications', val: d.ci  },
    { key: 'pk',  lbl: 'Pharmacokinetics',  val: d.pk  },
    d.pearl ? { key: 'pearl', lbl: '★ Step 1 Pearl', val: d.pearl, isPearl: true } : null,
  ].filter(f => f && f.val).filter(f => f.isPearl || f.key === 'sum' || quizVisibleFields.has(f.key));
  fieldsEl.innerHTML = buildFieldsHtml(ALL, color);
}

function flipCard() {
  const front = document.getElementById('fc-front');
  const back  = document.getElementById('fc-back');
  const actions = document.getElementById('fc-actions');
  if (!front || !back) return;
  if (front.style.display !== 'none') {
    front.style.display = 'none';
    back.style.display  = '';
    if (actions) actions.style.display = 'flex';
  }
}

function rateCard(rating) {
  if (rating !== 'skip') quizResults[rating] = (quizResults[rating] || 0) + 1;
  quizIdx++;
  updateQuizProgress();
  renderQuizCard();
}

function startQuizAgainOnly() {
  resetQuiz();
}

function quizNavBack() {
  if (quizIdx > 0) {
    quizIdx--;
    renderQuizCard();
    updateQuizProgress();
  }
}

function quizToggleStar(btn, name) {
  toggleBookmark(name);
  const isStarred = bookmarks.has(name);
  btn.textContent = isStarred ? '★' : '☆';
  btn.classList.toggle('starred', isStarred);
  syncBookmarkCount();
}

// ── Keyboard shortcuts ─────────────────────────────────────
document.addEventListener('keydown', e => {
  const search = document.getElementById('drug-search');
  const modalOpen = document.getElementById('drug-modal-overlay').classList.contains('open');

  if (modalOpen) {
    if (e.key === 'Escape') closeModal();
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { e.preventDefault(); modalNav(1); }
    if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   { e.preventDefault(); modalNav(-1); }
    if (e.key === 's' || e.key === 'S') toggleModalBookmark();
    return;
  }

  if (currentMode === 'quiz') {
    const front = document.getElementById('fc-front');
    const isFlipped = front && front.style.display === 'none';
    if (e.key === ' ') {
      e.preventDefault();
      if (!isFlipped) flipCard();
    }
    if (e.key === 'Enter') {
      e.preventDefault();
      if (!isFlipped) flipCard(); else rateCard('good');
    }
    if (isFlipped) {
      if (e.key === '1') { e.preventDefault(); rateCard('again'); }
      if (e.key === '2') { e.preventDefault(); rateCard('hard'); }
      if (e.key === '3') { e.preventDefault(); rateCard('good'); }
    }
    if (e.key === 'ArrowLeft') { e.preventDefault(); quizNavBack(); }
    if (e.key === 'ArrowRight') { e.preventDefault(); rateCard('skip'); }
    return;
  }

  if (e.key === '/' && document.activeElement !== search) {
    e.preventDefault(); search.focus(); search.select();
  }
  if (e.key === 'Escape' && searchQ) clearSearch();
});

window.addEventListener('appAuthStateChanged', () => { if (allDrugs.length) render(); });

document.addEventListener('DOMContentLoaded', () => {
  loadBookmarks();
  allDrugs = buildDrugList();
  activeTab = 'autonomic';
  buildCatPicker();
  render();
});
</script>
</body>
</html>
