<style>
/* ── Micro Facts: accent colour overrides (sage instead of sakura) ── */
:root {
  --accent:       var(--sage);
  --accent-light: var(--sage-light);
  --accent-glow:  rgba(94,154,112,.12);
  --nav-active-color: var(--sage);
}
/* Modal topbar default border before JS sets --cat-color */
.drug-modal-topbar { border-top-color: var(--sage); }
.rcard-bk-dot { display:inline-block; font-size:10px; color:var(--gold); margin-left:5px; line-height:1; }
.rcard-bk-dot::before { content:"★"; }
.bk-count { display:inline-flex; align-items:center; justify-content:center; min-width:18px; height:18px; padding:0 5px; border-radius:99px; background:var(--gold); color:#fff; font-size:10px; font-weight:700; margin-left:4px; }
/* Modal pearl border uses sage fallback */
.drug-modal-body .rcard-pearl {
  border: 1px solid color-mix(in srgb, var(--cat-color, var(--sage)) 25%, transparent);
}
/* Search highlight uses sage tint */
mark.search-hl { background: rgba(94,154,112,.18); color: var(--ink); border-radius: 2px; padding: 0 2px; }

/* ── Sketchy panel ───────────────────────────────────────── */
.sketchy-panel { margin-top: 18px; border: 1.5px solid var(--cat-color, var(--sage)); border-radius: 12px; overflow: hidden; }
.sketchy-panel-header { display: flex; align-items: center; gap: 8px; padding: 10px 14px; background: color-mix(in srgb, var(--cat-color, var(--sage)) 10%, transparent); cursor: pointer; font-size: 13px; font-weight: 600; color: var(--cat-color, var(--sage)); user-select: none; }
.sketchy-panel-header-icon { font-size: 13px; }
.sketchy-panel-header-chevron { margin-left: auto; font-size: 10px; transition: transform .2s; }
.sketchy-panel.collapsed .sketchy-panel-header-chevron { transform: rotate(-90deg); }
.sketchy-panel.collapsed .sketchy-panel-body { display: none; }
.sketchy-panel-body { padding: 10px 12px 12px; }
.sketchy-scene-tabs { display: flex; gap: 6px; margin-bottom: 8px; flex-wrap: wrap; }
.sketchy-scene-tab { padding: 3px 10px; border-radius: 20px; border: 1.5px solid var(--cat-color, var(--sage)); background: transparent; color: var(--cat-color, var(--sage)); font-size: 12px; cursor: pointer; transition: all .15s; }
.sketchy-scene-tab:hover { background: color-mix(in srgb, var(--cat-color, var(--sage)) 12%, transparent); }
.sketchy-scene-tab.active { background: var(--cat-color, var(--sage)); color: #fff; }
.sketchy-img-wrap img { width: 100%; border-radius: 8px; cursor: zoom-in; display: block; }
/* ── Lightbox ────────────────────────────────────────────── */
.sketchy-lightbox {
  display: none; position: fixed; inset: 0; z-index: 9999;
  background: rgba(0,0,0,.88);
  align-items: center; justify-content: center;
  cursor: zoom-out;
}
.sketchy-lightbox.open { display: flex; }
.sketchy-lightbox img {
  max-width: 92vw; max-height: 92vh;
  border-radius: 8px; box-shadow: 0 8px 48px rgba(0,0,0,.6);
}

</style>

<script>
const CAT_META = {
  bacteria:  { label: 'Bacteria',   color: '#3a7a5a', desc: 'Organized by Gram stain and morphology — the same way boards will test you. Master the GP/GN divide first, then nail the atypicals. Virulence factors and toxin mechanisms are highest-yield; memorize one unique fact per organism.' },
  viruses:   { label: 'Viruses',    color: '#5a4490', desc: 'DNA viruses are mostly double-stranded and replicate in the nucleus. RNA viruses are mostly single-stranded and cytoplasmic. Know herpesvirus reactivation patterns cold — perennial vignettes. HIV lifecycle and antiretroviral mechanisms are guaranteed questions.' },
  fungi:     { label: 'Fungi',      color: '#9e6a3d', desc: 'Systemic mycoses are tested by geography and exposure history. Opportunistic fungi appear almost exclusively in immunocompromised vignettes (HIV, transplant). The dimorphic rule: mold in the cold, yeast in the heat.' },
  parasites: { label: 'Parasites',  color: '#3d6e8a', desc: 'Transmission route is the single highest-yield fact for every parasite. Plasmodium (malaria) is the most tested parasite — know all four species. Toxoplasma and Cryptosporidium are classic HIV vignettes.' },
};

let allOrgs = [], activeTab = 'bacteria', searchQ = '', bookmarkFilter = false;

function buildOrgList() {
  const list = [];
  Object.entries(MICRO).forEach(([cat, groups]) =>
    groups.forEach(grp =>
      (grp.organisms || []).forEach(o => list.push({ ...o, category: cat, groupName: grp.group }))
    )
  );
  return list;
}

const SEARCH_ALIASES = [
  { patterns: ['gram positive', 'gram+', 'gram +', 'gram-positive'], replace: 'gp' },
  { patterns: ['gram negative', 'gram-', 'gram -', 'gram-negative'], replace: 'gn' },
  { patterns: ['gp cocci', 'gram positive cocci', 'gram+ cocci'], replace: 'gp cocci' },
  { patterns: ['gn cocci', 'gram negative cocci', 'gram- cocci'], replace: 'gn cocci' },
  { patterns: ['gp rods', 'gram positive rods', 'gram+ rods', 'gp bacilli', 'gram positive bacilli'], replace: 'gp rods' },
  { patterns: ['gn rods', 'gram negative rods', 'gram- rods', 'gn bacilli', 'gram negative bacilli'], replace: 'gn rods' },
];

function normalizeQuery(q) {
  for (const alias of SEARCH_ALIASES) {
    for (const pat of alias.patterns) {
      // exact match OR the query is a prefix of a pattern (handles mid-typing)
      if (pat === q || pat.startsWith(q)) return alias.replace;
    }
  }
  return q;
}

function getFiltered() {
  if (searchQ) {
    const nq = normalizeQuery(searchQ);
    return allOrgs.filter(o => {
      const blob = [o.name, o.gram, o.summary, o.disease, o.tx, o.pearl, o.virulence, o.lab_diagnosis]
        .filter(Boolean).join(' ').toLowerCase();
      return blob.includes(nq);
    });
  }
  if (activeTab === 'bookmarks' || bookmarkFilter) return allOrgs.filter(o => isBookmarked(o.name));
  return allOrgs.filter(o => o.category === activeTab);
}

function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function fmt(text, q) {
  if (!text) return '';
  let out = esc(text);
  out = out.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
  if (q) {
    const nq = normalizeQuery(q);
    const terms = nq !== q ? [nq, q] : [q];
    for (const term of terms) {
      const sq = term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      out = out.replace(new RegExp(`(${sq})(?![^<]*>)`, 'gi'), '<mark class="search-hl">$1</mark>');
    }
  }
  return out;
}

function fmtLines(text, q) {
  if (!text) return '';
  let out = fmt(text, q);
  // Split on \n line breaks embedded in the data
  const parts = out.split(/\n/);
  if (parts.length > 1) {
    return parts.map(p => p.trim()).filter(Boolean)
      .map(p => `<div class="info-line">${p}</div>`).join('');
  }
  // Fallback: split on period + space before a bold segment
  const parts2 = out.split(/(?<=\.) (?=<strong>)/);
  if (parts2.length > 1) {
    return parts2.map(p => `<div class="info-line">${p.trim()}</div>`).join('');
  }
  return `<div class="info-line">${out}</div>`;
}

function render() {
  const filtered = getFiltered();
  const isSearch = searchQ.length > 0;

  document.getElementById('results-meta').innerHTML = isSearch
    ? `<strong>${filtered.length}</strong> of ${allOrgs.length} organisms`
    : `<strong>${allOrgs.length}</strong> organisms`;

  renderTabs();
  renderPanels(filtered, isSearch);
}

function renderTabs() {
  let html = '';
  Object.entries(CAT_META).forEach(([cat, meta]) => {
    const isActive = (activeTab === cat && !searchQ);
    html += `<button class="cat-tab${isActive ? ' active' : ''}"
      onclick="switchTab('${cat}')" role="tab">
      <span class="tab-dot" style="background:${meta.color}"></span>${meta.label}
    </button>`;
  });
  document.getElementById('cat-tabs').innerHTML = html;
}

function renderPanels(filtered, isSearch) {
  const container = document.getElementById('panels-container');

  if (isSearch) {
    if (!filtered.length) {
      container.innerHTML = `<div class="cards-grid" style="margin-top:16px;">
        <div class="ref-empty">
          <div class="ref-empty-title">No results</div>
          <div class="ref-empty-sub">Try a different search term.</div>
        </div></div>`;
      return;
    }
    const cats = Object.keys(CAT_META).filter(c => filtered.some(o => o.category === c));
    container.innerHTML = cats.map(cat => {
      const catOrgs = filtered.filter(o => o.category === cat);
      if (!catOrgs.length) return '';
      const meta = CAT_META[cat];
      return `<div class="ref-panel" id="panel-${cat}">
        <div class="search-cat-label" style="color:${meta.color}">${meta.label}</div>
        <div class="cards-grid">${catOrgs.map(o => renderCard(o, meta.color)).join('')}</div>
      </div>`;
    }).join('');
    return;
  }

  if (!filtered.length) {
    container.innerHTML = `<div class="cards-grid" style="margin-top:16px;">
      <div class="ref-empty">
        <div class="ref-empty-title">Nothing here yet</div>
        <div class="ref-empty-sub">This category has no entries.</div>
      </div></div>`;
    return;
  }

  const cat = activeTab;
  const meta = CAT_META[cat];
  const groups = [...new Set(filtered.map(o => o.groupName))];

  const introHtml = `
    <div class="cat-intro" style="--cat-color:${meta.color}">
      <div class="cat-intro-title" style="color:${meta.color}">${meta.label}</div>
      <div class="cat-intro-desc">${meta.desc}</div>
    </div>`;

  const groupsHtml = groups.map((grp, gi) => {
    const grpOrgs = filtered.filter(o => o.groupName === grp);
    const gid = `grp-${cat}-${gi}`;
    return `<div class="group-section">
      <div class="class-group-header">
        <span class="class-label" style="color:${meta.color};border-color:${meta.color}40;background:${meta.color}12;">
          <span style="font-size:7px;">◆</span> ${grp}
        </span>
        <button class="group-expand-btn" style="--cat-color:${meta.color}" onclick="toggleGroup('${gid}',this)">▲ Collapse</button>
      </div>
      <div class="cards-grid" id="${gid}" style="display:grid;">
        ${grpOrgs.map(o => renderCard(o, meta.color)).join('')}
      </div>
    </div>`;
  }).join('');

  container.innerHTML = `<div class="ref-panel" id="panel-${cat}">${introHtml}${groupsHtml}</div>`;
}

function renderCard(o, catColor) {
  const color = catColor || CAT_META[o.category]?.color || 'var(--accent)';
  const q = searchQ;
  const bk = isBookmarked(o.name);

  return `<div class="rcard" data-cat="${o.category}" style="border-left-color:${color};--cat-color:${color}"
    tabindex="0" role="button" aria-label="${esc(o.name)}"
    onclick="openModal(this)">
    <div class="rcard-header">
      <div class="rcard-header-left">
        <div class="rcard-name">${fmt(o.name, q)}</div>
        ${o.gram ? `<div class="rcard-aka" style="color:${color}">${esc(o.gram)}</div>` : ''}
        ${bk ? '<span class="rcard-bk-dot"></span>' : ''}
      </div>
      <button class="rcard-toggle" style="color:${color}" tabindex="-1" aria-hidden="true">▼</button>
    </div>
    <div class="rcard-summary">${fmt(o.summary, q)}</div>
  </div>`;
}

/* ── Modal ───────────────────────────────────────────────── */
let modalOrgs = [], modalIdx = 0;

function openModal(cardEl) {
  if (window.getSelection().toString().length > 0) return;
  const filtered = getFiltered();
  modalOrgs = filtered;
  const cat = cardEl.dataset.cat;
  const name = cardEl.querySelector('.rcard-name')?.textContent;
  const idx = modalOrgs.findIndex(o => o.category === cat && o.name === name);
  modalIdx = idx >= 0 ? idx : 0;
  showModal();
}

function showModal() {
  const o = modalOrgs[modalIdx];
  if (!o) return;
  const color = CAT_META[o.category]?.color || 'var(--accent)';
  const catLabel = CAT_META[o.category]?.label || o.category;
  const q = searchQ;

  document.getElementById('micro-modal').style.setProperty('--cat-color', color);
  document.getElementById('modal-topbar').style.borderTopColor = color;

  document.getElementById('modal-banner').innerHTML = `
    <span class="drug-modal-banner-cat" style="color:${color};border-color:${color}50;background:${color}12;">${catLabel}</span>
    <span class="drug-modal-banner-sep">›</span>
    <span class="drug-modal-banner-grp">${o.groupName || ''}</span>
  `;
  document.getElementById('modal-title').innerHTML = fmt(o.name, q);

  const akaEl = document.getElementById('modal-aka');
  akaEl.textContent = o.gram || '';
  akaEl.style.display = o.gram ? '' : 'none';

  document.getElementById('modal-summary').innerHTML = fmt(o.summary, q);
  document.getElementById('modal-counter').textContent = `${modalIdx + 1} / ${modalOrgs.length}`;

  const sections = [
    { label: 'Virulence',     cls: 'lbl-vir', val: o.virulence     },
    { label: 'Diseases',      cls: 'lbl-dis', val: o.disease       },
    { label: 'Lab Diagnosis', cls: 'lbl-dx',  val: o.lab_diagnosis },
    { label: 'Treatment',     cls: 'lbl-tx',  val: o.tx            },
  ].filter(s => s.val);

  document.getElementById('modal-body').innerHTML = `
    ${sections.map(s => `
      <div class="rcard-field">
        <span class="rcard-field-label ${s.cls}">${s.label}</span>
        <div class="rcard-field-text">${fmtLines(s.val, q)}</div>
      </div>`).join('')}
    ${o.pearl ? `
      <div class="rcard-pearl">
        <span class="pearl-diamond" style="color:${color}">◆</span>
        <div class="pearl-body">
          <div class="pearl-text"><span class="pearl-label" style="color:${color}">Step 1 Pearl:</span> ${fmt(o.pearl, q)}</div>
        </div>
      </div>` : ''}
  `;

  document.getElementById('modal-prev').disabled = modalIdx === 0;
  document.getElementById('modal-next').disabled = modalIdx === modalOrgs.length - 1;
  document.getElementById('modal-body').scrollTop = 0;
  const starBtn = document.getElementById('modal-star-btn');
  if (starBtn) { updateStarBtn(modalOrgs[modalIdx]?.name || ''); }

  // ── Sketchy panel ──────────────────────────────────────────
  const sketchyEntry = (typeof SKETCHY_MAP !== 'undefined') ? SKETCHY_MAP[o.name] : null;
  const existingPanel = document.getElementById('sketchy-panel');
  if (existingPanel) existingPanel.remove();
  if (sketchyEntry && sketchyEntry.scenes?.length) {
    const scenes = sketchyEntry.scenes;
    const tabsHtml = scenes.length > 1
      ? `<div class="sketchy-scene-tabs">${scenes.map((s,i) =>
          `<button class="sketchy-scene-tab${i===0?' active':''}" onclick="sketchyTab(this,${i})">${s.title}</button>`
        ).join('')}</div>`
      : '';
    const panel = document.createElement('div');
    panel.id = 'sketchy-panel';
    panel.className = 'sketchy-panel';
    panel.innerHTML = `
      <div class="sketchy-panel-header" onclick="this.closest('.sketchy-panel').classList.toggle('collapsed')">
        <span class="sketchy-panel-header-icon"></span>
        Sketchy Micro
        <span class="sketchy-panel-header-chevron">▼</span>
      </div>
      <div class="sketchy-panel-body">
        ${tabsHtml}
        <div class="sketchy-img-wrap">
          <img id="sketchy-img" src="${scenes[0].img}" alt="${scenes[0].title}"
               onclick="sketchyLightbox('${scenes[0].img}')">
        </div>
      </div>`;
    document.getElementById('modal-body').appendChild(panel);
    panel._scenes = scenes;
  }

  document.getElementById('micro-modal-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('micro-modal-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

// ── Sketchy helpers ────────────────────────────────────────
function sketchyTab(btn, idx) {
  const panel = btn.closest('.sketchy-panel');
  panel.querySelectorAll('.sketchy-scene-tab').forEach((t,i) =>
    t.classList.toggle('active', i === idx));
  const scene = panel._scenes[idx];
  const img = document.getElementById('sketchy-img');
  img.src = scene.img;
  img.alt = scene.title;
  img.onclick = () => sketchyLightbox(scene.img);
}
function sketchyLightbox(src) {
  const lb = document.getElementById('sketchy-lightbox');
  lb.querySelector('img').src = src;
  lb.classList.add('open');
}
function sketchyLightboxClose() {
  document.getElementById('sketchy-lightbox').classList.remove('open');
}

// ── Bookmark filter button ──────────────────────────────────
function syncBookmarkCount() {
  const cnt = document.getElementById('bk-count');
  const btn = document.getElementById('bookmark-filter-btn');
  const bks = getBookmarks();
  if (cnt) cnt.textContent = bks.length;
  if (btn) btn.classList.toggle('active', bookmarkFilter);
}
function toggleBookmarkFilter() {
  bookmarkFilter = !bookmarkFilter;
  const btn = document.getElementById('bookmark-filter-btn');
  if (btn) btn.classList.toggle('active', bookmarkFilter);
  // If activating filter, switch to bookmarks tab; if deactivating, go back to bacteria
  activeTab = 'bacteria';
  renderTabs();
  render();
}

// ── Bookmarks (localStorage + Firebase sync) ───────────────
const BK_KEY = 'micro-bookmarks';
let _bookmarks = null;

function getBookmarks() {
  if (_bookmarks) return _bookmarks;
  try { _bookmarks = JSON.parse(localStorage.getItem(BK_KEY) || '[]'); }
  catch { _bookmarks = []; }
  return _bookmarks;
}

function saveBookmarks(arr) {
  _bookmarks = arr;
  localStorage.setItem(BK_KEY, JSON.stringify(arr));
  syncBookmarkCount();
  // Push to Firestore if signed in
  if (window.db && window.currentUser) {
    window.db.collection('users').doc(window.currentUser.uid)
      .collection('data').doc(BK_KEY)
      .set({ payload: JSON.stringify(arr), updatedAt: Date.now() })
      .catch(e => console.warn('Bookmark sync failed:', e));
  }
}

function isBookmarked(name) { return getBookmarks().includes(name); }

async function loadBookmarksFromCloud() {
  if (!window.db || !window.currentUser) return;
  try {
    const doc = await window.db.collection('users').doc(window.currentUser.uid)
      .collection('data').doc(BK_KEY).get();
    if (doc.exists) {
      const cloud = JSON.parse(doc.data().payload || '[]');
      // Merge: union of local + cloud
      const merged = [...new Set([...getBookmarks(), ...cloud])];
      _bookmarks = merged;
      localStorage.setItem(BK_KEY, JSON.stringify(merged));
      renderTabs();
      render();
    }
  } catch(e) { console.warn('Cloud bookmark load failed:', e); }
}

function toggleModalBookmark() {
  const org = modalOrgs[modalIdx];
  if (!org) return;
  const bks = getBookmarks();
  const idx = bks.indexOf(org.name);
  if (idx >= 0) { bks.splice(idx, 1); } else { bks.push(org.name); }
  saveBookmarks(bks);
  updateStarBtn(org.name);
  renderTabs(); // update count badge
  // Refresh card star indicators
  document.querySelectorAll('.rcard').forEach(c => {
    const n = c.querySelector('.rcard-name')?.textContent;
    if (n === org.name) {
      let dot = c.querySelector('.rcard-bk-dot');
      if (isBookmarked(n)) {
        if (!dot) { dot = document.createElement('span'); dot.className = 'rcard-bk-dot'; c.querySelector('.rcard-header-left').appendChild(dot); }
      } else { dot?.remove(); }
    }
  });
  if (activeTab === 'bookmarks') render();
}

function updateStarBtn(name) {
  const btn = document.getElementById('modal-star-btn');
  if (!btn) return;
  const bk = isBookmarked(name);
  btn.textContent = bk ? '★' : '☆';
  btn.style.color = bk ? 'var(--cat-color, var(--sage))' : '';
}

function modalNav(dir) {
  const next = modalIdx + dir;
  if (next >= 0 && next < modalOrgs.length) { modalIdx = next; showModal(); }
}

function handleModalOverlayClick(e) {
  if (e.target === document.getElementById('micro-modal-overlay')) closeModal();
}

function toggleGroup(gid, btn) {
  const grid = document.getElementById(gid);
  const hidden = grid.style.display === 'none';
  grid.style.display = hidden ? '' : 'none';
  btn.textContent = hidden ? '▲ Collapse' : '▼ Expand';
}

function switchTab(cat) {
  activeTab = cat;
  searchQ = '';
  document.getElementById('micro-search').value = '';
  render();
}

function onSearch() {
  searchQ = document.getElementById('micro-search').value.toLowerCase().trim();
  render();
}

document.addEventListener('keydown', e => {
  const search = document.getElementById('micro-search');
  const modalOpen = document.getElementById('micro-modal-overlay').classList.contains('open');

  if (modalOpen) {
    if (e.key === 'Escape') closeModal();
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { e.preventDefault(); modalNav(1); }
    if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   { e.preventDefault(); modalNav(-1); }
    return;
  }

  if (e.key === '/' && document.activeElement !== search) {
    e.preventDefault(); search.focus(); search.select();
  }
  if ((e.key === 'Enter' || e.key === ' ') && e.target.classList.contains('rcard')) {
    e.preventDefault(); openModal(e.target);
  }
  if (e.key === 'Escape' && searchQ) { search.value = ''; onSearch(); }
});

window.addEventListener('appAuthStateChanged', (e) => {
  if (e.detail?.user) {
    loadBookmarksFromCloud().then(() => { if (allOrgs.length) { renderTabs(); render(); } });
  } else {
    _bookmarks = [];
    localStorage.removeItem(BK_KEY);
    if (allOrgs.length) { renderTabs(); render(); }
  }
});

// Called by app.js after full cloud sync completes on sign-in
window.onCloudSyncComplete = function() {
  _bookmarks = null; // force reload from updated localStorage
  syncBookmarkCount();
  renderTabs();
  render();
};
document.addEventListener('DOMContentLoaded', () => {
  allOrgs = buildOrgList();
  syncBookmarkCount();
  activeTab = 'bacteria';
  render();
});
</script>
<div class="sketchy-lightbox" id="sketchy-lightbox" onclick="sketchyLightboxClose()">
  <img src="" alt="Sketchy scene">
</div>

</body>
</html>
