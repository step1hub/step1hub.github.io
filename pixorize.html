<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="style.css"/>
<title>Pixorize · Step 1 Hub</title>
<style>
.tracker-toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:20px;}
.tracker-search{flex:1;min-width:160px;padding:7px 12px;border:1px solid var(--border2);border-radius:var(--r);font-size:13px;font-family:inherit;background:var(--bg);color:var(--ink2);outline:none;transition:border-color .15s;box-shadow:none;}
.tracker-search:focus{border-color:var(--dim);}
.filter-chips{display:flex;gap:6px;flex-wrap:wrap;}
.filter-chip{padding:6px 14px;border-radius:99px;font-size:12px;font-weight:600;border:1px solid var(--border);background:var(--surface2);color:var(--muted);cursor:pointer;transition:all .15s;white-space:nowrap;}
.filter-chip.active{background:var(--sky);color:#fff;border-color:var(--sky);}
.filter-chip.f-watched.active{background:var(--sakura2);border-color:var(--sakura2);}
.filter-chip.f-reviewed.active{background:var(--gold);border-color:var(--gold);color:#fff;}
.toolbar-right{display:flex;gap:8px;margin-left:auto;}
.toolbar-btn{padding:7px 14px;border-radius:var(--r);font-size:12px;font-weight:600;border:1px solid var(--border);background:transparent;color:var(--ink2);cursor:pointer;transition:all .15s;white-space:nowrap;}
.toolbar-btn:hover{background:var(--surface2);}
.overall-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:22px 26px;margin-bottom:20px;}
.overall-top{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;margin-bottom:12px;}
.overall-title{font-family:'Playfair Display',serif;font-size:19px;font-weight:600;}
.overall-stats{display:flex;gap:18px;font-size:13px;}
.overall-stat{color:var(--muted);font-size:12px;}
.overall-stat strong{color:var(--ink2);font-size:14px;}
.overall-bar-bg{background:var(--border2);border-radius:99px;height:8px;overflow:hidden;}
.overall-bar-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--sky),var(--fuji));transition:width .5s ease;}
.overall-sub{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-top:6px;}
.cat-section{border:1px solid var(--border);border-radius:var(--r-lg);margin-bottom:10px;overflow:hidden;background:var(--surface);}
.cat-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;cursor:pointer;gap:12px;transition:background .12s;}
.cat-header:hover{background:var(--surface2);}
.cat-chevron:hover{background:var(--surface2);color:var(--ink2);}
.cat-header-left{display:flex;align-items:center;gap:12px;flex:1;min-width:0;}
.cat-accent{width:4px;height:36px;border-radius:99px;flex-shrink:0;}
.cat-name{font-family:'Playfair Display',serif;font-size:17px;font-weight:600;}
.cat-why{font-size:12px;color:var(--muted);margin-top:2px;}
.cat-header-right{display:flex;align-items:center;gap:14px;flex-shrink:0;}
.cat-count{font-size:12px;color:var(--muted);font-weight:600;white-space:nowrap;}
.cat-mini-bar{width:80px;height:5px;background:var(--border2);border-radius:99px;overflow:hidden;}
.cat-mini-fill{height:100%;border-radius:99px;transition:width .4s;}
.cat-chevron{font-size:11px;color:var(--dim);transition:transform .2s;background:none;border:none;cursor:pointer;padding:4px 6px;border-radius:4px;line-height:1;}
.cat-section.open .cat-chevron{transform:rotate(180deg);}
.cat-body{display:none;border-top:1px solid var(--border2);}
.cat-section.open .cat-body{display:block;}
.video-header-row{display:flex;align-items:center;padding:8px 20px;font-size:10px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border2);background:var(--bg);}
.video-row{display:flex;align-items:center;padding:11px 20px;border-bottom:1px solid var(--border2);gap:12px;transition:background .1s;}
.video-row:last-child{border-bottom:none;}
.video-row:hover{background:var(--surface2);}
.video-row.hidden-row{display:none;}
.video-name{flex:1;font-size:13.5px;color:var(--ink2);line-height:1.4;}
.video-row.is-reviewed .video-name{text-decoration:line-through;color:var(--dim);}
.video-time{font-size:11px;color:var(--dim);min-width:52px;text-align:right;font-family:'DM Mono',monospace;margin-right:20px;}
.check-btns{display:flex;gap:6px;}
.icon-btn{width:34px;height:34px;border-radius:8px;border:1.5px solid var(--border);background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;transition:all .15s;line-height:1;flex-shrink:0;color:var(--dim);}
.icon-btn:hover{transform:scale(1.1);}
.icon-btn.active-w{background:var(--sage);border-color:var(--sage);color:#fff;}
.icon-btn.active-r{background:var(--gold);border-color:var(--gold);color:#fff;}
.tracker-legend{display:flex;gap:16px;align-items:center;flex-wrap:wrap;font-size:12px;color:var(--muted);margin-bottom:16px;}
.no-results{text-align:center;padding:40px;color:var(--muted);font-size:14px;}
.tracker-sep{height:1px;background:var(--border2);margin:0 0 20px;border-radius:99px;}

/* ── Tabs ──────────────────────────────────────────────── */
.tab-bar {
  display: flex; gap: 4px; margin-bottom: 16px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r-lg); padding: 5px;
}
.tab-btn {
  flex: 1; padding: 8px 10px; border-radius: 10px;
  border: none; background: transparent;
  font-size: 12px; font-weight: 600; color: var(--muted);
  cursor: pointer; transition: all .15s; white-space: nowrap;
  display: flex; flex-direction: column; align-items: center; gap: 2px;
}
.tab-btn:hover { background: var(--surface2); color: var(--ink2); }
.tab-btn.active { background: var(--bg); color: var(--ink); box-shadow: 0 1px 4px rgba(42,31,26,.08); }
.tab-btn .tab-label { font-size: 12px; font-weight: 600; }
.tab-btn .tab-sub { font-size: 10px; color: var(--dim); font-weight: 400; }
.tab-btn.active .tab-sub { color: var(--muted); }

.accent-0{background:var(--sakura2);}
.accent-1{background:var(--sky);}
.accent-2{background:var(--gold);}
.accent-3{background:var(--sage);}
.accent-4{background:var(--fuji);}
.accent-5{background:var(--peach);}
.accent-6{background:var(--lavender);}
.accent-7{background:#7ba8cf;}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--ink);color:#fff;padding:10px 22px;border-radius:99px;font-size:13px;font-weight:600;z-index:9999;opacity:0;transition:opacity .25s,transform .25s;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<script src="nav.js"></script>
<div class="wrap">
  <header class="hero" style="padding:36px 0 16px;">
    <div class="hero-eyebrow" style="font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--sakura2);margin-bottom:10px;">Progress Tracker</div>
    <h1 class="hero-name" style="font-size:clamp(30px,4vw,46px);letter-spacing:-0.5px;font-weight:700;line-height:1.1;margin-bottom:6px;">Pixorize <em>Biochem & Immuno</em></h1>
  </header>

  <div class="overall-card">
    <div class="overall-top">
      <span class="overall-title">Overall Progress</span>
      <div class="overall-stats">
        <span class="overall-stat" style="display:inline-flex;align-items:center;gap:5px;"><span style="display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:5px;background:var(--sage);color:#fff;font-size:10px;">✔</span><strong id="tot-w">0</strong> Watched</span>
        <span class="overall-stat" style="display:inline-flex;align-items:center;gap:5px;"><span style="display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:5px;background:var(--gold);color:#fff;font-size:10px;">✦</span><strong id="tot-r">0</strong> Reviewed</span>
      </div>
    </div>
    <div class="overall-bar-bg"><div class="overall-bar-fill-w" id="overall-bar-w" style="width:0%;"></div><div class="overall-bar-fill-r" id="overall-bar-r" style="width:0%;"></div></div>
    <div class="overall-sub">
      <span id="overall-note">0% reviewed</span>
      <span id="overall-total">0 / 0 videos</span>
    </div>
  </div>

  <div class="tracker-toolbar">
    <input class="tracker-search" id="search-input" type="text" placeholder="Search videos…" oninput="applyFilters()"/>
    <div class="filter-chips">
      <div class="filter-chip active" onclick="setFilter('all',this)">All</div>
      <div class="filter-chip f-watched" onclick="setFilter('unwatched',this)">Not Watched</div>
      <div class="filter-chip f-watched" onclick="setFilter('watched',this)">Watched</div>
      <div class="filter-chip f-reviewed" onclick="setFilter('reviewed',this)">Reviewed</div>
    </div>
    <div class="toolbar-right">
      <button class="toolbar-btn" id="toggle-expand-btn" onclick="toggleExpand()">Expand All</button>
    </div>
  </div>

  <div class="tracker-sep"></div>
  <div class="tab-bar" id="tab-bar">
    <button class="tab-btn active" onclick="setTab('biochem',this)">
      <span class="tab-label">Biochemistry</span>
      <span class="tab-sub">Vitamins · Pathways · Metabolism</span>
    </button>
    <button class="tab-btn" onclick="setTab('genetics',this)">
      <span class="tab-label">Genetics & Disease</span>
      <span class="tab-sub">Chromosomes · Collagen · Neuro</span>
    </button>
    <button class="tab-btn" onclick="setTab('immuno',this)">
      <span class="tab-label">Immunology</span>
      <span class="tab-sub">Cells · Cytokines · Reactions</span>
    </button>
    <button class="tab-btn" onclick="setTab('misc',this)">
      <span class="tab-label">Behavioral & Misc</span>
      <span class="tab-sub">Psych · Embryo · Cytoskeleton</span>
    </button>
  </div>

  <div id="tracker-container"></div>
  <div class="no-results" id="no-results" style="display:none;">No videos match your search.</div>

  <footer class="footer"><div>Step 1 Study Hub · 🌸</div><div id="footer-date"></div></footer>
</div>
<script src="pixorize_categories.js"></script>
<script src="app.js"></script>
<script>
const STORE_KEY = 'pixorize';

const CATEGORIES = PIXORIZE_CATEGORIES; // loaded from pixorize_categories.js

const ACCENTS = ['accent-0','accent-1','accent-2','accent-3','accent-4','accent-5','accent-6','accent-7'];

const TAB_GROUPS = {
  biochem:   ["vitamins","biochempathways","porphyrias","metabolic","lysosomal","glycogen","peroxisome","mitochondrial","dyslipidemias"],
  genetics:  ["autosomal_dom","chromosomal","collagen","dnarepair","neuro_disorders","toxicology","germlayer","cytoskeleton"],
  immuno:    ["immunoglobulins","complement","celltypes","bcells_tcells","cytokines","immunodef","hypersensitivity","transfusion","transplant"],
  misc:      ["misc","personality"]
};

let activeTab = 'biochem';

function setTab(tab, el) {
  activeTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderAll();
}

function getCatsForTab() {
  const ids = TAB_GROUPS[activeTab] || [];
  return CATEGORIES.filter(c => ids.includes(c.id));
}

let progress = {};
let activeFilter = 'all';

// load: reads from localStorage (already synced from Firestore on sign-in via app.js)
function load() { progress = Store.get(STORE_KEY, {}); }

// save: writes to localStorage immediately, then pushes to Firestore in background
function save() { CloudSync.save(STORE_KEY, progress); }

// Called by app.js after Firebase sync completes — reload progress and re-render
window.onCloudSyncComplete = function() { load(); renderAll(); };
function getState(id) { return progress[id] || {w:false,r:false}; }

function toggle(id, field) {
  const s = getState(id);
  if (field === 'w') { 
    s.w = !s.w; 
    if (!s.w) s.r = false; 
  } else { 
    s.r = !s.r; 
    if (s.r) s.w = true; 
  }
  progress[id] = s; 
  save(); 
  updateVideoRow(id); 
  updateSummary();
}

function updateVideoRow(id) {
  const s = getState(id);
  const wb = document.getElementById('btn-w-'+id);
  const rb = document.getElementById('btn-r-'+id);
  if(wb) wb.className = `icon-btn${s.w ? ' active-w' : ''}`;
  if(rb) rb.className = `icon-btn${s.r ? ' active-r' : ''}`;
  const row = document.getElementById('row-'+id);
  if(row) row.classList.toggle('hidden-row', !rowVisible(id));
  if(row) row.classList.toggle('is-reviewed', s.r);
}

function rowVisible(id) {
  const s = getState(id);
  if(activeFilter === 'all') return true;
  if(activeFilter === 'unwatched') return !s.w;
  if(activeFilter === 'watched') return s.w;
  if(activeFilter === 'reviewed') return s.r;
  return true;
}

function setFilter(f,el) {
  activeFilter = f;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  applyFilters();
}

function applyFilters() {
  const q = document.getElementById('search-input').value.toLowerCase().trim();
  let anyVisible = false;
  getCatsForTab().forEach(cat => {
    let catHasVisible = false;
    cat.videos.forEach(v => {
      const ms = !q || v.name.toLowerCase().includes(q);
      const mf = rowVisible(v.id);
      const visible = ms && mf;
      const row = document.getElementById('row-'+v.id);
      if(row) row.classList.toggle('hidden-row', !visible);
      if(visible) { catHasVisible = true; anyVisible = true; }
    });
    const sec = document.getElementById('sec-'+cat.id);
    if(sec) sec.style.display = catHasVisible ? '' : 'none';
    if(catHasVisible && q) sec.classList.add('open');
  });
  document.getElementById('no-results').style.display = anyVisible ? 'none' : 'block';
  updateCatHeaders();
}

function updateCatHeaders() {
  getCatsForTab().forEach(cat => {
    const w = cat.videos.filter(v => getState(v.id).w).length;
    const r = cat.videos.filter(v => getState(v.id).r).length;
    const total = cat.videos.length;
    const pct = total ? Math.round((r / total) * 100) : 0;
    const el = document.getElementById('cat-count-'+cat.id);
    if(el) el.textContent = `${r} / ${total} reviewed`;
    const fill = document.getElementById('cat-fill-'+cat.id);
    if(fill) fill.style.width = pct + '%';
  });
}

function updateSummary() {
  const all = CATEGORIES.flatMap(c => c.videos);
  const tw = all.filter(v => getState(v.id).w).length;
  const tr = all.filter(v => getState(v.id).r).length;
  const total = all.length;
  const pct = total ? Math.round((tr / total) * 100) : 0;
  
  document.getElementById('tot-w').textContent = tw;
  document.getElementById('tot-r').textContent = tr;
  document.getElementById('overall-bar-w').style.width = (total ? Math.round((tw / total) * 100) : 0) + '%';
  document.getElementById('overall-bar-r').style.width = pct + '%';
  document.getElementById('overall-note').textContent = pct + '% reviewed';
  document.getElementById('overall-total').textContent = tr + ' / ' + total + ' videos';
  updateCatHeaders();
}

function toggleExpand() {
  const sections = document.querySelectorAll('.cat-section');
  const anyClosed = Array.from(sections).some(s => !s.classList.contains('open'));
  sections.forEach(s => s.classList.toggle('open', anyClosed));
  document.getElementById('toggle-expand-btn').textContent = anyClosed ? 'Collapse All' : 'Expand All';
}

function resetAll() { if(!confirm('Reset ALL progress?')) return; progress={}; save(); renderAll(); showToast('Progress reset'); }

function renderAll() {
  const container = document.getElementById('tracker-container');
  const tabCats = getCatsForTab();
  container.innerHTML = tabCats.map((cat, idx) => {
    const accent = ACCENTS[idx % ACCENTS.length];
    const rows = cat.videos.map(v => {
      const s = getState(v.id);
      return `<div class="video-row${s.r ? ' is-reviewed' : ''}" id="row-${v.id}">
        <div class="video-name">${v.name}</div>
        <div class="video-time">${v.time}</div>
        <div class="check-btns">
          <button id="btn-w-${v.id}" class="icon-btn${s.w ? ' active-w' : ''}" onclick="toggle('${v.id}','w')" title="Watched">✔</button>
          <button id="btn-r-${v.id}" class="icon-btn${s.r ? ' active-r' : ''}" onclick="toggle('${v.id}','r')" title="Reviewed">✦</button>
        </div>
      </div>`;
    }).join('');
    return `<div class="cat-section" id="sec-${cat.id}">
      <div class="cat-header" onclick="this.closest('.cat-section').classList.toggle('open')">
        <div class="cat-header-left">
          <div class="cat-accent ${accent}"></div>
          <div>
            <div class="cat-name">${cat.name}</div>
            <div class="cat-why">${cat.why}</div>
          </div>
        </div>
        <div class="cat-header-right">
          <span class="cat-count" id="cat-count-${cat.id}">0 / ${cat.videos.length} reviewed</span>
          <div class="cat-mini-bar"><div class="cat-mini-fill-w" id="cat-fill-w-${cat.id}" style="width:0%;"></div><div class="cat-mini-fill-r" id="cat-fill-r-${cat.id}" style="width:0%;"></div></div>
          <button class="cat-chevron" onclick="this.closest('.cat-section').classList.toggle('open');event.stopPropagation()">▼</button>
        </div>
      </div>
      <div class="cat-body">
        <div class="video-header-row">
          <div style="flex:1;">Video</div>
          <div style="min-width:52px;text-align:right;margin-right:20px;">Time</div>
          <div style="min-width:74px;text-align:center;">Status</div>
        </div>
        ${rows}
      </div>
    </div>`;
  }).join('');
  updateSummary();
  applyFilters();
}

function showToast(msg) {
  const t = document.getElementById('toast') || (() => { const el = document.createElement('div'); el.id = 'toast'; el.className = 'toast'; document.body.appendChild(el); return el; })();
  t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2000);
}

document.addEventListener('DOMContentLoaded', () => { load(); renderAll(); });
</script>
</body>
</html>
